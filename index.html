function hairTopCap(cx, hY, hR, hRY, extraUp, sideInset) {
  // Top cap: covers scalp from forehead up to crown+extraUp
  const top = hY - hRY - extraUp;
  const brow = hY - hRY * 0.25;  // forehead line
  const sideR = hR * (1 - sideInset);
  return [
    // Main cap
    `M ${cx-sideR} ${brow} C ${cx-sideR-4} ${top+10}, ${cx-sideR*0.3} ${top}, ${cx} ${top-2} C ${cx+sideR*0.3} ${top}, ${cx+sideR+4} ${top+10}, ${cx+sideR} ${brow}`,
    // Left side down to ear area

  ];
}

// Mesh grid for warp
const WARP_COLS = 12;
const WARP_ROWS = 20;

// ── WARP ENGINE ──
// Displacement for each vertex based on body sliders
function computeWarp(vert_nx, vert_ny, fat, muscle, height, waist) {
  const x = vert_nx, y = vert_ny;
  let dx = 0, dy = 0;

  const f = (fat - 50) / 50;        // -1..1
  const m = (muscle - 50) / 50;     // -1..1
  const h = (height - 50) / 50;     // -1..1
  const w = (waist - 50) / 50;      // -1..1

  // ── FAT — horizontal expansion ──
  // Profile: max at belly (y 0.55-0.75), moderate at chest/hips, none at head/feet
  let fatPro = 0;
  if (y > 0.10 && y < 0.30) fatPro = 0.2 * (y - 0.10) / 0.20;
  else if (y >= 0.30 && y < 0.50) fatPro = 0.3 + 0.3 * (y - 0.30) / 0.20;
  else if (y >= 0.50 && y < 0.65) fatPro = 0.6 + 0.4 * (y - 0.50) / 0.15;
  else if (y >= 0.65 && y < 0.78) fatPro = 1.0;
  else if (y >= 0.78 && y < 0.88) fatPro = 1.0 - 0.5 * (y - 0.78) / 0.10;
  else if (y >= 0.88) fatPro = 0.5 - 0.5 * Math.min(1, (y - 0.88) / 0.12);
  const edgeDist = Math.abs(x - 0.5) / 0.5;
  const edgeF = Math.pow(edgeDist, 1.5);
  const dir = x > 0.5 ? 1 : -1;
  dx += f * fatPro * 0.10 * edgeF * dir;

  // ── MUSCLE — localized bulges ──
  let musPro = 0, musDir = 0;
  // Shoulders (y 0.20-0.30)
  if (y >= 0.20 && y < 0.30) {
    const t = (y - 0.20) / 0.10;
    musPro = 0.10 * Math.sin(t * Math.PI);
    musDir = dir;
  }
  // Biceps (y 0.35-0.45)
  else if (y >= 0.35 && y < 0.45) {
    const t = (y - 0.35) / 0.10;
    musPro = 0.08 * Math.sin(t * Math.PI);
    musDir = dir;
  }
  // Chest (y 0.25-0.38)
  else if (y >= 0.25 && y < 0.38) {
    const t = (y - 0.25) / 0.13;
    musPro = 0.10 * Math.sin(t * Math.PI);
    const chestLat = 1 - Math.abs(x - 0.35) / 0.15;
    if (chestLat > 0) musPro *= Math.min(1, chestLat);
    musDir = x > 0.5 ? 1 : -1;
  }
  // Thighs (y 0.78-0.88)
  else if (y >= 0.78 && y < 0.88) {
    const t = (y - 0.78) / 0.10;
    musPro = 0.08 * Math.sin(t * Math.PI);
    musDir = dir;
  }
  dx += m * musPro * edgeF * musDir;

  // ── HEIGHT — vertical stretch from top ──
  if (y > 0.12) {
    const hAmt = h * 0.12;
    const hPro = (y - 0.12) / 0.88;
    dy += hAmt * hPro;
  }

  // ── WAIST — independent narrow/wide at mid-torso ──
  if (y >= 0.35 && y < 0.65) {
    const wa = Math.sin((y - 0.35) / 0.30 * Math.PI);
    const latD = Math.abs(x - 0.5) / 0.5;
    dx += w * 0.06 * wa * Math.pow(latD, 1.2) * dir;
  }

  return { dx, dy };
}

// Render warped body using triangle affine transform (seam-free with rounded clip)
function renderWarpedBody(srcCanvas, fat, muscle, height, waist) {
  const sw = srcCanvas.width, sh = srcCanvas.height;
  const outCanvas = document.createElement('canvas');
  outCanvas.width = sw;
  outCanvas.height = sh;
  const outCtx = outCanvas.getContext('2d');

  // Build warp grid
  const grid = [];
  for (let r = 0; r <= WARP_ROWS; r++) {
    const row = [];
    for (let c = 0; c <= WARP_COLS; c++) {
      const nx = c / WARP_COLS, ny = r / WARP_ROWS;
      const d = computeWarp(nx, ny, fat, muscle, height, waist);
      row.push({
        x: (nx + d.dx) * sw,
        y: (ny + d.dy) * sh
      });
    }
    grid.push(row);
  }

  // Source UV in pixels
  const srcUV = [];
  for (let r = 0; r <= WARP_ROWS; r++) {
    const row = [];
    for (let c = 0; c <= WARP_COLS; c++) {
      row.push({ u: (c / WARP_COLS) * sw, v: (r / WARP_ROWS) * sh });
    }
    srcUV.push(row);
  }

  // Draw each quad as 2 triangles with rounded clip to prevent seams
  for (let r = 0; r < WARP_ROWS; r++) {
    for (let c = 0; c < WARP_COLS; c++) {
      const d0 = grid[r][c], d1 = grid[r][c+1], d2 = grid[r+1][c], d3 = grid[r+1][c+1];
      const s0 = srcUV[r][c], s1 = srcUV[r][c+1], s2 = srcUV[r+1][c], s3 = srcUV[r+1][c+1];

      // Triangle 1: d0-d1-d2
      drawTri(outCtx, srcCanvas,
        d0.x, d0.y, d1.x, d1.y, d2.x, d2.y,
        s0.u, s0.v, s1.u, s1.v, s2.u, s2.v
      );
      // Triangle 2: d1-d3-d2
      drawTri(outCtx, srcCanvas,
        d1.x, d1.y, d3.x, d3.y, d2.x, d2.y,
        s1.u, s1.v, s3.u, s3.v, s2.u, s2.v
      );
    }
  }

  return outCanvas;
}

// Draw a single triangle with affine transform and rounded clip (seam-free)
function drawTri(ctx, img, x0,y0, x1,y1, x2,y2, u0,v0, u1,v1, u2,v2) {
  const a0 = x1 - x0, b0 = y1 - y0;
  const a1 = x2 - x0, b1 = y2 - y0;
  const c0 = u1 - u0, d0 = v1 - v0;
  const c1 = u2 - u0, d1 = v2 - v0;
  const det = c0 * d1 - c1 * d0;
  if (Math.abs(det) < 0.0001) return;

  const A = (a0 * d1 - a1 * d0) / det;
  const B = (a1 * c0 - a0 * c1) / det;
  const C = (b0 * d1 - b1 * d0) / det;
  const D = (b1 * c0 - b0 * c1) / det;
  const E = x0 - A * u0 - B * v0;
  const F = y0 - C * u0 - D * v0;

  ctx.save();
  ctx.beginPath();
  // Rounded coords to prevent sub-pixel seam gaps
  ctx.moveTo(Math.round(x0 * 2) / 2, Math.round(y0 * 2) / 2);
  ctx.lineTo(Math.round(x1 * 2) / 2, Math.round(y1 * 2) / 2);
  ctx.lineTo(Math.round(x2 * 2) / 2, Math.round(y2 * 2) / 2);
  ctx.closePath();
  ctx.clip();
  ctx.transform(A, C, B, D, E, F);
  ctx.drawImage(img, 0, 0);
  ctx.restore();
}

// Get warped body as data URL, cropped to visible body bounds
function getWarpedBodyDataURL(sex, fat, muscle, height, waist) {
  const isMale = sex === 'male';
  const srcImg = isMale ? bodyImgMale : bodyImgFemale;
  if (!srcImg || !srcImg.width) return null;

  // Draw source to temp canvas
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = srcImg.width;
  tmpCanvas.height = srcImg.height;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(srcImg, 0, 0);

  // Warp it
  const warpedCanvas = renderWarpedBody(tmpCanvas, fat, muscle, height, waist);
  const w = warpedCanvas.width, h = warpedCanvas.height;

  // Find visible pixel bounds (with padding)
  const wCtx = warpedCanvas.getContext('2d');
  const wData = wCtx.getImageData(0, 0, w, h);
  let minX = w, maxX = 0, minY = h, maxY = 0;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (wData.data[(y * w + x) * 4 + 3] > 10) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  const pad = 4;
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(w - 1, maxX + pad);
  maxY = Math.min(h - 1, maxY + pad);

  const cropW = maxX - minX + 1;
  const cropH = maxY - minY + 1;

  // Crop to body bounds
  const cropCanvas = document.createElement('canvas');
  cropCanvas.width = cropW;
  cropCanvas.height = cropH;
  const cropCtx = cropCanvas.getContext('2d');
  cropCtx.putImageData(wData, -minX, -minY);
  // Re-clip with proper transparency
  const imgData = cropCtx.getImageData(0, 0, cropW, cropH);
  cropCtx.putImageData(imgData, 0, 0);

  return {
    dataURL: cropCanvas.toDataURL('image/png'),
    bodyX: minX, bodyY: minY,
    bodyW: cropW, bodyH: cropH,
    fullW: w, fullH: h
  };
}

const SVG = {
  el: document.getElementById('character-preview'),
  layers: {},
  _init(){
    ['back-hair','body','genitals','clothing','head','face','hair','accessories'].forEach(id=>{
      this.layers[id] = document.getElementById('layer-'+id);
    });
  },
  _g(id){ return this.layers[id]; },
  _clear(id){ const g=this._g(id); if(g) g.innerHTML=''; },
  _path(parent,d,fill,stroke,sw){
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d); p.setAttribute('fill',fill||'none');
    if(stroke){p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',sw||'1');}
    parent.appendChild(p); return p;
  },
  _ellipse(parent,cx,cy,rx,ry,fill,stroke,sw){
    const e=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    e.setAttribute('cx',cx);e.setAttribute('cy',cy);e.setAttribute('rx',rx);e.setAttribute('ry',ry);
    e.setAttribute('fill',fill||'none');
    if(stroke){e.setAttribute('stroke',stroke);e.setAttribute('stroke-width',sw||'1');}
    parent.appendChild(e); return e;
  },
  _circle(parent,cx,cy,r,fill){
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('fill',fill||'none');
    parent.appendChild(c);
  },
  _line(parent,x1,y1,x2,y2,stroke,sw){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',stroke||'#000');l.setAttribute('stroke-width',sw||'1');
    l.setAttribute('stroke-linecap','round');
    parent.appendChild(l);
  },

  _updateSkinGradient(){
    const tones = skinTonesForEthnicity();
    const idx = clamp(Math.floor(S.character.skinToneIdx||0), 0, tones.length-1);
    const key = tones[idx];
    const stops = SKIN_TONES[key].stops;
    for(let i=0;i<4;i++){
      const el = document.getElementById('skin-stop-'+i);
      if(el) el.setAttribute('stop-color', stops[i]);
    }
  },

  _updateHairGradient(){
    const colors = hairColorsForEthnicity();
    const idx = clamp(S.character.hairColor, 0, colors.length-1);
    const stops = colors[idx].stops;
    for(let i=0;i<3;i++){
      const el = document.getElementById('hair-stop-'+i);
      if(el) el.setAttribute('stop-color', stops[i]);
    }
  },

  render(){
    const c = S.character;
    const isF = c.sex === 'female';
    const isI = c.sex === 'intersex';

    // ── Normalize sliders to 0-1 ──
    const t = {
      chest:   c.chest/100,
      waist:   c.waist/100,
      hips:    c.hips/100,
      height:  c.height/100,
      weight:  c.weight/100,
      muscle:  c.muscle/100,
      organ:   c.organSize/100,
      hWidth:  c.headWidth/100,
      hLength: c.headLength/100,
    };

    // ── Core proportions ──
    const cx = 100;
    const headR = lerp(40, 54, t.hWidth);     // head radius X
    const headRY = lerp(46, 58, t.hLength);    // head radius Y
    const headY = 72;                           // head center Y
    const neckW = lerp(8, 16, t.weight);
    const neckH = lerp(10, 18, t.muscle);
    const shoulderY = headY + headRY + neckH;
    const shW = lerp(isF?22:28, isF?34:44, t.weight) + lerp(0, 8, t.muscle) + lerp(0, 6, t.chest);
    const waistW = lerp(isF?10:14, isF?22:26, t.weight) - lerp(0, 6, t.muscle) + lerp(0, -4, t.waist);
    const hipW = lerp(isF?14:10, isF?28:18, t.hips) + lerp(0, 8, t.weight);
    const torsoH = lerp(140, 200, t.height);
    const waistY = shoulderY + torsoH * 0.42;
    const hipY = shoulderY + torsoH * 0.72;
    const legH = lerp(120, 170, t.height);
    const footY = hipY + legH;
    const legW = lerp(5, 10, t.weight) + lerp(0, 5, t.muscle);
    const legGap = 2 + legW * 0.3;
    // Update gradients
    this._updateSkinGradient();
    this._updateHairGradient();

    const skinFill = 'url(#skinGrad)';
    const hairFill = 'url(#hairGrad)';
    const outline = '#3a2a1a';
    const outlineW = 2;

    // Clear all layers
    ['back-hair','body','genitals','clothing','head','face','hair','accessories'].forEach(id=>this._clear(id));

    // ═══ BODY LAYER ═══ (PNG warp)
    const bodyG = this._g('body');

    // Render warped PNG body and display as SVG <image>
    if (bodyImagesLoaded) {
      const bodyResult = getWarpedBodyDataURL(c.sex, c.weight, c.muscle, c.height, c.waist);
      if (bodyResult) {
        // Map the cropped body to SVG body area
        // Shoulder/neck starts at around shoulderY in SVG
        const svgBodyY = shoulderY - 6;
        const svgHeight = footY - svgBodyY + 8;
        const scale = svgHeight / bodyResult.bodyH;
        const svgWidth = bodyResult.bodyW * scale;
        const svgX = cx - svgWidth / 2;

        const img = document.createElementNS('http://www.w3.org/2000/svg','image');
        img.setAttribute('href', bodyResult.dataURL);
        img.setAttribute('x', svgX);
        img.setAttribute('y', svgBodyY);
        img.setAttribute('width', svgWidth);
        img.setAttribute('height', svgHeight);
        bodyG.appendChild(img);
      }
    }

    // ═══ HEAD LAYER ═══
    const headG = this._g('head');
    // Head shape: ellipse with width/length control
    this._ellipse(headG, cx, headY, headR, headRY, skinFill, outline, outlineW);
    // Ears
    this._path(headG, `M ${cx-headR+2} ${headY-4} C ${cx-headR-6} ${headY-10}, ${cx-headR-8} ${headY+2}, ${cx-headR-4} ${headY+8} C ${cx-headR} ${headY+10}, ${cx-headR+4} ${headY+6}, ${cx-headR+2} ${headY} Z`, skinFill, outline, 1.5);
    this._path(headG, `M ${cx+headR-2} ${headY-4} C ${cx+headR+6} ${headY-10}, ${cx+headR+8} ${headY+2}, ${cx+headR+4} ${headY+8} C ${cx+headR} ${headY+10}, ${cx+headR-4} ${headY+6}, ${cx+headR-2} ${headY} Z`, skinFill, outline, 1.5);

    // ═══ FACE LAYER ═══
    const faceG = this._g('face');
    const eyeY = headY + lerp(-2, 4, t.hLength);
    const eyeSp = lerp(16, 24, t.hWidth);
    const eyeType = EYE_TYPES[c.eyeType] || EYE_TYPES[0];
    const noseType = NOSE_TYPES[c.noseType] || NOSE_TYPES[0];

    // ── Eyes based on type ──
    const eyeW = eyeType.key==='round'?14 : eyeType.key==='narrow'?10 : eyeType.key==='wide'?16 : 13;
    const eyeH = eyeType.key==='round'?12 : eyeType.key==='narrow'?6 : eyeType.key==='wide'?10 : 9;
    const irisR = eyeType.key==='round'?7 : eyeType.key==='narrow'?4 : 6;
    const lidWeight = eyeType.key==='hooded'?3.5 : 2.5;

    for(const side of [-1, 1]){
      const ex = cx + side * eyeSp;
      // Sclera
      this._ellipse(faceG, ex, eyeY, eyeW, eyeH, 'white', outline, 1);
      // Iris
      this._circle(faceG, ex, eyeY+1, irisR, '#4a3080');
      // Pupil
      this._circle(faceG, ex, eyeY+1, irisR*0.5, '#1a0830');
      // Upper lid
      this._path(faceG, `M ${ex-eyeW} ${eyeY-eyeH*0.3} C ${ex-eyeW*0.5} ${eyeY-eyeH-4}, ${ex+eyeW*0.5} ${eyeY-eyeH-4}, ${ex+eyeW} ${eyeY-eyeH*0.3}`, 'none', '#2a1a10', lidWeight);
      // Lower lid hint
      this._path(faceG, `M ${ex-eyeW+2} ${eyeY+eyeH*0.5} C ${ex} ${eyeY+eyeH+2}, ${ex+eyeW-2} ${eyeY+eyeH+2}`, 'none', outline, 0.8);
      // Highlights
      this._circle(faceG, ex+irisR*0.3, eyeY-irisR*0.3, irisR*0.4, 'white');
      this._circle(faceG, ex-irisR*0.2, eyeY+irisR*0.3, irisR*0.2, 'white');
    }

    // Eyebrows
    const browY = eyeY - eyeH - 8;
    this._path(faceG, `M ${cx-eyeSp-eyeW} ${browY} C ${cx-eyeSp-eyeW*0.3} ${browY-4}, ${cx-eyeSp+eyeW*0.3} ${browY-4}, ${cx-eyeSp+eyeW} ${browY+2}`, 'none', outline, 1.8);
    this._path(faceG, `M ${cx+eyeSp+eyeW} ${browY} C ${cx+eyeSp+eyeW*0.3} ${browY-4}, ${cx+eyeSp-eyeW*0.3} ${browY-4}, ${cx+eyeSp-eyeW} ${browY+2}`, 'none', outline, 1.8);

    // ── Nose based on type ──
    const noseY = headY + lerp(8, 14, t.hLength);
    if(noseType.key==='small'){
      this._path(faceG, `M ${cx-2} ${noseY} L ${cx} ${noseY+6} L ${cx+2} ${noseY}`, 'none', '#a08070', 1.2);
    } else if(noseType.key==='medium'){
      this._path(faceG, `M ${cx-4} ${noseY-2} L ${cx-2} ${noseY+8} C ${cx} ${noseY+10}, ${cx+2} ${noseY+8}, ${cx+4} ${noseY-2}`, 'none', '#a08070', 1.2);
    } else if(noseType.key==='pointed'){
      this._path(faceG, `M ${cx-3} ${noseY-4} L ${cx} ${noseY+10} L ${cx+3} ${noseY-4}`, 'none', '#907060', 1.3);
    } else if(noseType.key==='flat'){
      this._path(faceG, `M ${cx-6} ${noseY+2} C ${cx-4} ${noseY+8}, ${cx+4} ${noseY+8}, ${cx+6} ${noseY+2}`, 'none', '#a08070', 1.2);
      this._path(faceG, `M ${cx-4} ${noseY+4} C ${cx-2} ${noseY+8}, ${cx+2} ${noseY+8}, ${cx+4} ${noseY+4}`, 'none', '#b09080', 0.8);
    } else if(noseType.key==='button'){
      this._path(faceG, `M ${cx-3} ${noseY} C ${cx-4} ${noseY+6}, ${cx} ${noseY+8}, ${cx+4} ${noseY+6} C ${cx+3} ${noseY+4}, ${cx+2} ${noseY}, ${cx-2} ${noseY} Z`, 'none', '#a08070', 1.2);
    } else { // hooked
      this._path(faceG, `M ${cx-2} ${noseY-6} C ${cx+2} ${noseY-2}, ${cx+4} ${noseY+4}, ${cx+2} ${noseY+10} C ${cx} ${noseY+12}, ${cx-2} ${noseY+10}, ${cx-4} ${noseY+4}`, 'none', '#907060', 1.3);
    }

    // Mouth
    const mouthY = headY + lerp(22, 32, t.hLength);
    this._path(faceG, `M ${cx-14} ${mouthY} C ${cx-6} ${mouthY+6}, ${cx+6} ${mouthY+6}, ${cx+14} ${mouthY}`, 'url(#lipGrad)', '#a06060', 1);
    this._path(faceG, `M ${cx-12} ${mouthY+1} C ${cx-4} ${mouthY+4}, ${cx+4} ${mouthY+4}, ${cx+12} ${mouthY+1}`, 'none', '#c07070', 0.5);

    // ═══ HAIR LAYER ═══
    const hairG = this._g('hair');
    const hairIdx = clamp(c.hairstyle, 0, HAIRSTYLES.length-1);
    const hairKey = HAIRSTYLES[hairIdx]?.key || 'none';
    const genFn = HAIRSTYLE_GENERATORS[hairKey];
    if (genFn) {
      const paths = genFn(cx, headY, headR, headRY);
      paths.forEach(d => this._path(hairG, d, hairFill, '#2a1508', 1.5));
    }

    // ═══ GENITALS LAYER ═══
    const genG = this._g('genitals');
    const genY = hipY + 4;
    const organT = t.organ;

    if(c.sex === 'male'){
      // Penis
      const pLen = lerp(8, 22, organT);
      const pW = lerp(3, 7, organT);
      this._path(genG, `M ${cx-pW} ${genY} C ${cx-pW-1} ${genY+pLen*0.5}, ${cx-pW} ${genY+pLen}, ${cx} ${genY+pLen+2} C ${cx+pW} ${genY+pLen}, ${cx+pW+1} ${genY+pLen*0.5}, ${cx+pW} ${genY} Z`, skinFill, outline, 1.5);
      // Balls
      const ballR = lerp(3, 7, organT);
      this._ellipse(genG, cx-ballR, genY+2, ballR, ballR*0.8, skinFill, outline, 1.2);
      this._ellipse(genG, cx+ballR, genY+2, ballR, ballR*0.8, skinFill, outline, 1.2);
    } else if(c.sex === 'female'){
      // Vulva
      const vW = lerp(4, 10, organT);
      const vH = lerp(3, 7, organT);
      // Mons
      this._ellipse(genG, cx, genY-2, vW+2, vH+2, skinFill, outline, 1.5);
      // Labia
      this._path(genG, `M ${cx-vW} ${genY} C ${cx-vW+1} ${genY+vH}, ${cx-1} ${genY+vH+2}, ${cx} ${genY+vH} C ${cx+1} ${genY+vH+2}, ${cx+vW-1} ${genY+vH}, ${cx+vW} ${genY}`, 'none', '#804040', 1.2);
      // Clitoris
      this._circle(genG, cx, genY-1, lerp(1, 2.5, organT), '#a06060');
    } else { // intersex
      const pLen = lerp(4, 12, organT);
      const pW = lerp(2, 5, organT);
      this._path(genG, `M ${cx-pW} ${genY} C ${cx-pW-1} ${genY+pLen*0.5}, ${cx-pW} ${genY+pLen}, ${cx} ${genY+pLen+1} C ${cx+pW} ${genY+pLen}, ${cx+pW+1} ${genY+pLen*0.5}, ${cx+pW} ${genY} Z`, skinFill, outline, 1.5);
      const vW = lerp(3, 7, organT);
      this._path(genG, `M ${cx-vW} ${genY+2} C ${cx-vW+1} ${genY+6}, ${cx} ${genY+8}, ${cx+vW-1} ${genY+6} C ${cx+vW} ${genY+4}, ${cx+vW} ${genY+2}, ${cx} ${genY+1}`, 'none', '#804040', 1);
    }
  }
};

function wireStep(){
  const stepEl = document.getElementById('step-'+S.step);
  if(!stepEl) return;

  // Range sliders
  stepEl.querySelectorAll('input[type="range"]').forEach(input=>{
    input.addEventListener('input', ()=>{
      const key = input.id.replace('slider-','');
      if(key.startsWith('mbti-')){
        const mbtiKey = key.replace('mbti-','');
        S.character.mbti[mbtiKey] = parseInt(input.value);
      } else if(key === 'skinTone'){
        S.character.skinToneIdx = parseInt(input.value);
      } else if(key === 'hairColor'){
        S.character.hairColor = parseInt(input.value);
      } else if(key === 'ethnicity'){
        const ethIdx = Math.round(parseInt(input.value) / (100/(ETHNICITIES.length-1)));
        S.character.ethnicity = ETHNICITIES[clamp(ethIdx,0,ETHNICITIES.length-1)];
      } else if(key === 'age'){
        S.character.age = 18 + Math.round(parseInt(input.value) * 51 / 100);
      } else {
        S.character[key] = parseInt(input.value);
      }
      updateUI();
    });
  });

  // Grid buttons
  stepEl.querySelectorAll('.grid-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const key = btn.dataset.key;
      const idx = parseInt(btn.dataset.idx);
      const val = btn.dataset.val;
      if(val !== undefined){
        S.character[key] = val;
      } else {
        S.character[key] = idx;
      }
      // Update selected state
      stepEl.querySelectorAll(`.grid-btn[data-key="${key}"]`).forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      updateUI();
    });
  });

  // Name input
  const nameInput = stepEl.querySelector('#name-input');
  if(nameInput){
    nameInput.addEventListener('input', ()=>{
      S.character.name = nameInput.value || 'Alex';
    });
  }
}

function updateUI(){
  const c = S.character;
  const stepEl = document.getElementById('step-'+S.step);
  if(!stepEl) return;

  // Update slider values
  stepEl.querySelectorAll('input[type="range"]').forEach(input=>{
    const key = input.id.replace('slider-','');
    const valEl = document.getElementById(input.id+'-val');
    if(!valEl) return;

    if(key === 'age'){
      input.value = Math.round((c.age - 18) * 100 / 51);
      valEl.textContent = ageLabel(c.age);
    } else if(key === 'ethnicity'){
      const ethIdx = ETHNICITIES.indexOf(c.ethnicity);
      input.value = Math.round(ethIdx * (100/(ETHNICITIES.length-1)));
      valEl.textContent = c.ethnicity;
    } else if(key === 'skinTone'){
      const tones = skinTonesForEthnicity();
      input.max = Math.max(0, tones.length-1);
      input.value = clamp(c.skinToneIdx||0, 0, tones.length-1);
      valEl.textContent = tones[clamp(c.skinToneIdx||0,0,tones.length-1)]||'';
    } else if(key === 'hairColor'){
      const colors = hairColorsForEthnicity();
      input.max = Math.max(0, colors.length-1);
      input.value = clamp(c.hairColor, 0, colors.length-1);
      valEl.textContent = colors[clamp(c.hairColor,0,colors.length-1)]?.label||'';
    } else if(key.startsWith('mbti-')){
      const mbtiKey = key.replace('mbti-','');
      input.value = c.mbti[mbtiKey];
      valEl.textContent = c.mbti[mbtiKey]+'%';
    } else {
      input.value = c[key] ?? 50;
      valEl.textContent = (c[key]??50)+'%';
    }
  });

  // Update grid button selection
  stepEl.querySelectorAll('.grid-btn').forEach(btn=>{
    const key = btn.dataset.key;
    const idx = parseInt(btn.dataset.idx);
    const val = btn.dataset.val;
    if(val !== undefined){
      btn.classList.toggle('selected', c[key] === val);
    } else {
      btn.classList.toggle('selected', c[key] === idx);
    }
  });

  // Socio preview
  const socioEl = document.getElementById('socio-preview');
  if(socioEl){
    const cash = Math.round(Math.pow(c.finances/100, 2.5) * 50000);
    socioEl.innerHTML = `
      <span class="cash">Starting Cash: $${cash.toLocaleString()}</span>
      <span class="detail">Family: ${c.finances<30?'Working class':c.finances<60?'Middle class':'Upper class'}</span>
      <span class="detail">Connections: ${c.socialCapital<30?'None':c.socialCapital<60?'Some':'Well-connected'}</span>
      <span class="detail">Neighborhood: ${c.neighborhood<30?'Rough':c.neighborhood<60?'Average':'Upscale'}</span>
    `;
  }

  // Re-render character
  SVG.render();
}

function updateNav(){
  document.getElementById('step-indicator').textContent = (S.step+1)+' / '+S.totalSteps;
  document.getElementById('progress-fill').style.width = ((S.step+1)/S.totalSteps*100)+'%';
  document.getElementById('btn-back').style.visibility = S.step===0?'hidden':'visible';
}

// ══════════════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════════════
document.getElementById('btn-back').addEventListener('click', ()=>{
  if(S.step>0){ S.step--; renderStep(); updateNav(); }
});
document.getElementById('btn-continue').addEventListener('click', ()=>{
  if(S.step<S.totalSteps-1){ S.step++; renderStep(); updateNav(); }
});

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
SVG._init();
renderStep();
updateNav();
</script>
</body>
</html>
