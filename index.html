<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>LifeSim — PNG Body Warp Demo</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: system-ui, -apple-system, sans-serif; }

    .app {
      display: grid;
      grid-template-rows: 42vh 1fr 72px;
      grid-template-areas: "preview" "sliders" "nav";
      height: 100dvh; height: 100vh;
    }
    @media (min-width: 768px) {
      .app {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 72px;
        grid-template-areas: "preview sliders" "nav nav";
      }
    }

    .preview-zone { grid-area: preview; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: radial-gradient(ellipse at 50% 40%, #1a1a3e, #0a0a1a); }
    .preview-zone canvas { max-width: 100%; max-height: 100%; display: block; }

    .sliders-zone {
      grid-area: sliders; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; display: flex; flex-direction: column; justify-content: center;
      gap: 4px; padding: 8px 12px; background: #0f0f23;
    }
    .step[hidden] { display: none !important; }
    .step-title { color: #FFD700; font-size: 18px; font-weight: 800; padding: 4px 4px 0; }

    .slider-row { display: flex; flex-direction: column; gap: 0; padding: 4px; flex: 0 0 auto; }
    .slider-row > div:first-child { display: flex; justify-content: space-between; align-items: center; }
    .slider-label { color: #999; font-size: 10px; max-width: 60%; }
    .slider-value { color: #0f3; font-size: 12px; font-weight: bold; }
    .range-hints { display: flex; justify-content: space-between; font-size: 8px; color: #555; padding: 0 2px; }

    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 44px; background: transparent; cursor: pointer; touch-action: pan-y; }
    input[type="range"]:focus { outline: none; }
    input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 5px; border-radius: 3px; background: #333; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 44px; height: 44px; border-radius: 50%; background: #FFD700; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.5); margin-top: -20px; }
    input[type="range"]::-moz-range-track { width: 100%; height: 5px; border-radius: 3px; background: #333; }
    input[type="range"]::-moz-range-thumb { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #fff; background: #FFD700; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

    .nav-zone { grid-area: nav; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: #0a0a1a; border-top: 2px solid #e94560; }
    .nav-zone button { padding: 10px 24px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; touch-action: manipulation; }
    .btn-continue { background: #e94560; color: #fff; }
    .btn-back { background: #222; color: #aaa; }

    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; flex: 1; min-height: 0; overflow-y: auto; }
    .grid-btn {
      padding: 8px 4px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e;
      color: #aaa; font-size: 11px; font-weight: 600; cursor: pointer;
      touch-action: manipulation; text-align: center; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .grid-btn.selected { border-color: #FFD700; background: rgba(255,215,0,0.1); color: #FFD700; }
  </style>
</head>
<body>
<div class="app">
  <div class="preview-zone">
    <canvas id="body-canvas"></canvas>
  </div>

  <div class="sliders-zone" id="sliders-zone">
    <div class="step">
      <div class="step-title">Body Shaping</div>

      <div class="slider-row">
        <div><span class="slider-label">Fatness</span><span class="slider-value" id="fat-val">50</span></div>
        <input type="range" id="fat-slider" min="0" max="100" value="50">
        <div class="range-hints"><span>Slim</span><span>Heavy</span></div>
      </div>

      <div class="slider-row">
        <div><span class="slider-label">Muscle</span><span class="slider-value" id="muscle-val">50</span></div>
        <input type="range" id="muscle-slider" min="0" max="100" value="50">
        <div class="range-hints"><span>Minimal</span><span>Ripped</span></div>
      </div>

      <div class="slider-row">
        <div><span class="slider-label">Height</span><span class="slider-value" id="height-val">50</span></div>
        <input type="range" id="height-slider" min="0" max="100" value="50">
        <div class="range-hints"><span>Short</span><span>Tall</span></div>
      </div>

      <div class="slider-row">
        <div><span class="slider-label">Waist</span><span class="slider-value" id="waist-val">50</span></div>
        <input type="range" id="waist-slider" min="0" max="100" value="50">
        <div class="range-hints"><span>Narrow</span><span>Wide</span></div>
      </div>
    </div>
  </div>

  <nav class="nav-zone">
    <button class="btn-back" id="btn-reset">Reset</button>
    <span style="color:#555;font-size:13px;font-weight:600">PNG Warp Demo</span>
    <button class="btn-continue" id="btn-screenshot">Save</button>
  </nav>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// PNG BODY WARP — Canvas Mesh Deformation
// ══════════════════════════════════════════════════════════════

const canvas = document.getElementById('body-canvas');
const ctx = canvas.getContext('2d');

const bodyImg = new Image();
bodyImg.src = 'body.png';

// Mesh grid dimensions
const COLS = 14;
const ROWS = 24;

// Warp state
let fat = 50;
let muscle = 50;
let height = 50;
let waist = 50;
let imgLoaded = false;
let imgW, imgH;

// Buffer canvases for speed
let srcCanvas, srcCtx;

// ── MESH SETUP ──

// Define the rest-position grid (normalized 0..1 for x,y)
// Each vertex: { x, y, zone }
function buildRestGrid(w, h) {
  const grid = [];
  for (let row = 0; row <= ROWS; row++) {
    const rowVerts = [];
    for (let col = 0; col <= COLS; col++) {
      rowVerts.push({ x: col / COLS, y: row / ROWS });
    }
    grid.push(rowVerts);
  }
  return grid;
}

// ── WARP ENGINE ──

// Compute displacement for each vertex based on sliders
function computeDisplacement(vert, fat, muscle, height, waist) {
  const x = vert.x;
  const y = vert.y;
  let dx = 0, dy = 0;

  // Normalize sliders to -1..1 range
  const f = (fat - 50) / 50;        // -1 (thin) to 1 (fat)
  const m = (muscle - 50) / 50;     // -1 to 1
  const h = (height - 50) / 50;     // -1 to 1
  const w = (waist - 50) / 50;      // -1 (narrow) to 1 (wide)

  // ── FAT DISPLACEMENT ──
  // Horizontal expansion based on body region
  // Max at waist/belly (y=0.55-0.75), moderate at chest/hips, none at head/feet
  let fatProfile = 0;
  if (y < 0.15) fatProfile = 0;                       // head — no fat
  else if (y < 0.35) fatProfile = 0.3 * (y - 0.15) / 0.2;  // neck — ramp up
  else if (y < 0.50) fatProfile = 0.5 + 0.3 * (y - 0.35) / 0.15; // chest — moderate
  else if (y < 0.60) fatProfile = 0.8 + 0.2 * (y - 0.50) / 0.10; // upper belly
  else if (y < 0.72) fatProfile = 1.0;                 // belly — max
  else if (y < 0.82) fatProfile = 1.0 - 0.3 * (y - 0.72) / 0.10; // lower belly decline
  else if (y < 0.92) fatProfile = 0.7 - 0.4 * (y - 0.82) / 0.10; // thighs decline
  else fatProfile = 0.3 * (1 - (y - 0.92) / 0.08);    // calves — minimal

  // Fat also expands vertically (belly sag)
  let fatDY = 0;
  if (f > 0 && y > 0.55 && y < 0.78) {
    fatDY = f * 0.06 * Math.sin((y - 0.55) / 0.23 * Math.PI);
  }

  // Apply fat — center-based horizontal displacement
  const centerX = 0.5;
  const dir = x > centerX ? 1 : -1;
  const distFromCenter = Math.abs(x - centerX) / 0.5;
  // Outer edges move more, center stays
  const edgeFactor = Math.pow(distFromCenter, 1.5);

  dx += f * fatProfile * 0.12 * edgeFactor * dir;
  dy += fatDY;

  // ── MUSCLE DISPLACEMENT ──
  // Localized bulges at: shoulders, biceps, chest, thighs
  let muscleProfile = 0;
  let muscleDir = 0;

  // Shoulders (y=0.32-0.42)
  if (y >= 0.32 && y < 0.42) {
    const t = (y - 0.32) / 0.10;
    const bulge = Math.sin(t * Math.PI);
    muscleProfile = 0.12 * bulge;
    muscleDir = dir;  // outward from center
  }
  // Biceps (y=0.46-0.56)
  else if (y >= 0.46 && y < 0.56) {
    const t = (y - 0.46) / 0.10;
    const bulge = Math.sin(t * Math.PI);
    muscleProfile = 0.10 * bulge;
    muscleDir = dir;
  }
  // Chest define (y=0.38-0.50)
  else if (y >= 0.38 && y < 0.50) {
    const t = (y - 0.38) / 0.12;
    const bulge = Math.sin(t * Math.PI);
    // Chest: also bulges at ~0.3 from center (pecs)
    const chestLateral = 1 - Math.abs(x - 0.35) / 0.15;
    const lateralFactor = Math.max(0, Math.min(1, chestLateral));
    muscleProfile = 0.14 * bulge * lateralFactor;
    muscleDir = 1;
    // Pecs push outward from sternum
    if (x > 0.45) muscleDir = 1;
    else if (x < 0.55) muscleDir = -1;
    else muscleDir = 0;
  }
  // Thighs (y=0.78-0.90)
  else if (y >= 0.78 && y < 0.90) {
    const t = (y - 0.78) / 0.12;
    const bulge = Math.sin(t * Math.PI);
    muscleProfile = 0.10 * bulge;
    muscleDir = dir;
  }

  dx += m * muscleProfile * edgeFactor * muscleDir;

  // ── HEIGHT DISPLACEMENT ──
  // Vertical stretch/compress from top
  if (y > 0.15) {
    const heightAmount = h * 0.15;
    // Scale factor increases toward bottom
    const heightProfile = (y - 0.15) / 0.85;
    dy += heightAmount * heightProfile;
  }

  // ── WAIST DISPLACEMENT ──
  // Independent waist narrow/wide at y=0.55-0.75
  if (y >= 0.50 && y < 0.78) {
    const waistArea = Math.sin((y - 0.50) / 0.28 * Math.PI);
    const waistPull = w * 0.08 * waistArea;
    // At center, no change; at edges, pull in/out
    const lateralDist = Math.abs(x - centerX) / 0.5;
    const lateralFactor = Math.pow(lateralDist, 1.2);
    dx += waistPull * lateralFactor * dir;
  }

  return { dx, dy };
}

// Draw triangle with affine transform
function drawTri(dst, img, 
  x0,y0, x1,y1, x2,y2,   // destination coords  
  u0,v0, u1,v1, u2,v2    // source coords
) {
  const a0 = x1 - x0, b0 = y1 - y0;
  const a1 = x2 - x0, b1 = y2 - y0;
  const c0 = u1 - u0, d0 = v1 - v0;
  const c1 = u2 - u0, d1 = v2 - v0;

  const det = c0 * d1 - c1 * d0;
  if (Math.abs(det) < 0.0001) return;

  const A = (a0 * d1 - a1 * d0) / det;
  const B = (a1 * c0 - a0 * c1) / det;
  const C = (b0 * d1 - b1 * d0) / det;
  const D = (b1 * c0 - b0 * c1) / det;
  const E = x0 - A * u0 - B * v0;
  const F = y0 - C * u0 - D * v0;

  dst.save();
  dst.beginPath();
  dst.moveTo(x0, y0);
  dst.lineTo(x1, y1);
  dst.lineTo(x2, y2);
  dst.closePath();
  dst.clip();
  dst.transform(A, C, B, D, E, F);
  dst.drawImage(img, 0, 0);
  dst.restore();
}

// Render the body with current warp
function renderBody() {
  if (!imgLoaded) return;

  const cw = canvas.width;
  const ch = canvas.height;

  ctx.clearRect(0, 0, cw, ch);

  // Build warped grid
  const restGrid = buildRestGrid();
  const warpGrid = [];

  for (let row = 0; row <= ROWS; row++) {
    const rowVerts = [];
    for (let col = 0; col <= COLS; col++) {
      const rest = restGrid[row][col];
      const disp = computeDisplacement(rest, fat, muscle, height, waist);

      // Scale displacement to canvas size
      const sx = disp.dx * imgW;
      const sy = disp.dy * imgH;

      // Also allow the image to be drawn at its natural aspect ratio within canvas
      const scale = Math.min(cw / imgW, ch / imgH) * 0.85;
      const ox = (cw - imgW * scale) / 2;
      const oy = (ch - imgH * scale) / 2;
      
      // Scale and offset
      const px = rest.x * imgW * scale + ox + sx * scale;
      const py = rest.y * imgH * scale + oy + sy * scale;

      rowVerts.push({ x: px, y: py });
    }
    warpGrid.push(rowVerts);
  }

  // Draw triangles
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      // Quad: (row,col), (row,col+1), (row+1,col), (row+1,col+1)
      const a = warpGrid[row][col];
      const b = warpGrid[row][col+1];
      const c = warpGrid[row+1][col];
      const d = warpGrid[row+1][col+1];

      // Source coords (rest grid in image pixel space)
      const sa_x = restGrid[row][col].x * imgW;
      const sa_y = restGrid[row][col].y * imgH;
      const sb_x = restGrid[row][col+1].x * imgW;
      const sb_y = restGrid[row][col+1].y * imgH;
      const sc_x = restGrid[row+1][col].x * imgW;
      const sc_y = restGrid[row+1][col].y * imgH;
      const sd_x = restGrid[row+1][col+1].x * imgW;
      const sd_y = restGrid[row+1][col+1].y * imgH;

      // Tri 1: a-b-c
      drawTri(ctx, srcCanvas,
        a.x, a.y, b.x, b.y, c.x, c.y,
        sa_x, sa_y, sb_x, sb_y, sc_x, sc_y
      );
      // Tri 2: b-d-c
      drawTri(ctx, srcCanvas,
        b.x, b.y, d.x, d.y, c.x, c.y,
        sb_x, sb_y, sd_x, sd_y, sc_x, sc_y
      );
    }
  }
}

// ── RESIZE ──

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  if (imgLoaded) renderBody();
}

// ── IMAGE LOADING ──

bodyImg.onload = () => {
  imgW = bodyImg.width;
  imgH = bodyImg.height;
  imgLoaded = true;

  // Create source buffer
  srcCanvas = document.createElement('canvas');
  srcCanvas.width = imgW;
  srcCanvas.height = imgH;
  srcCtx = srcCanvas.getContext('2d');
  srcCtx.drawImage(bodyImg, 0, 0);

  resize();
};

bodyImg.onerror = () => {
  // Fallback: try body2.png
  bodyImg.src = 'body2.png';
  bodyImg.onerror = () => {
    document.querySelector('.preview-zone').innerHTML = 
      '<div style="color:#e94560;padding:20px;text-align:center;">Failed to load body PNG</div>';
  };
};

// ── SLIDER BINDING ──

function bindSlider(id, stateKey, displayId) {
  const slider = document.getElementById(id);
  const display = document.getElementById(displayId);
  slider.addEventListener('input', () => {
    const val = parseInt(slider.value);
    window[stateKey] = val;
    display.textContent = val;
    if (imgLoaded) renderBody();
  });
}

bindSlider('fat-slider', 'fat', 'fat-val');
bindSlider('muscle-slider', 'muscle', 'muscle-val');
bindSlider('height-slider', 'height', 'height-val');
bindSlider('waist-slider', 'waist', 'waist-val');

document.getElementById('btn-reset').addEventListener('click', () => {
  ['fat','muscle','height','waist'].forEach(k => {
    window[k] = 50;
    document.getElementById(k + '-slider').value = 50;
    document.getElementById(k + '-val').textContent = '50';
  });
  if (imgLoaded) renderBody();
});

document.getElementById('btn-screenshot').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'character_' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// ── INIT ──

window.addEventListener('resize', resize);
resize();

</script>
</body>
</html>
