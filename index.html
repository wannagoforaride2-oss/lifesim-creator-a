  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: system-ui, -apple-system, sans-serif; }

    /* ── APP GRID ── */
    .app {
      display: grid;
      grid-template-rows: 42vh 1fr 72px;
      grid-template-areas: "preview" "sliders" "nav";
      height: 100dvh; height: 100vh;
    }
    @media (min-width: 768px) {
      .app {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 72px;
        grid-template-areas: "preview sliders" "nav nav";
      }
    }

    /* ── PREVIEW ZONE ── */
    .preview-zone { grid-area: preview; display: grid; position: relative; overflow: hidden; background: #0a0a1a; }
    .preview-zone > * { grid-area: 1/1; width: 100%; height: 100%; }
    .preview-character { z-index: 1; }

    /* ── SLIDERS ZONE ── */
    .sliders-zone {
      grid-area: sliders; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; display: flex; flex-direction: column; justify-content: center;
      gap: 4px; padding: 8px 12px; background: #0f0f23;
    }
    .step { display: flex; flex-direction: column; gap: 4px; }
    .step[hidden] { display: none !important; }
    .step-title { color: #FFD700; font-size: 18px; font-weight: 800; padding: 4px 4px 0; }
    .step-subtitle { color: #aaaacc; font-size: 12px; padding: 0 4px 4px; }

    /* ── SLIDER ROW ── */
    .slider-row { display: flex; flex-direction: column; gap: 0; padding: 4px; flex: 0 0 auto; }
    .slider-row > div:first-child { display: flex; justify-content: space-between; align-items: center; }
    .slider-label { color: #999; font-size: 10px; max-width: 60%; }
    .slider-value { color: #0f3; font-size: 12px; font-weight: bold; }
    .range-hints { display: flex; justify-content: space-between; font-size: 8px; color: #555; padding: 0 2px; }

    /* ── NATIVE RANGE INPUT ── */
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 44px; background: transparent; cursor: pointer; touch-action: pan-y; }
    input[type="range"]:focus { outline: none; }
    input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 5px; border-radius: 3px; background: #333; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 44px; height: 44px; border-radius: 50%; background: #FFD700; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.5); margin-top: -20px; }
    input[type="range"]::-moz-range-track { width: 100%; height: 5px; border-radius: 3px; background: #333; }
    input[type="range"]::-moz-range-thumb { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #fff; background: #FFD700; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    input[type="range"].grad::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--g-l), var(--g-r)); }

    /* ── PREVIEW FULL ── */
    .preview-full { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 20px; min-height: 0; }
    .preview-full .step-title { font-size: 22px; text-align: center; }
    .preview-full .step-subtitle { font-size: 14px; text-align: center; }

    /* ── NAME INPUT ── */
    .name-input-wrap { display: flex; flex-direction: column; gap: 8px; padding: 8px 4px; }
    .name-input-wrap input[type="text"] { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #eee; font-size: 16px; }

    /* ── NAV ZONE ── */
    .nav-zone { grid-area: nav; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: #0a0a1a; border-top: 2px solid #e94560; }
    .nav-zone button { padding: 10px 24px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; touch-action: manipulation; }
    .btn-back { background: #222; color: #aaa; }
    .btn-continue { background: #e94560; color: #fff; }
    .step-indicator-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .step-indicator { color: #555; font-size: 13px; font-weight: 600; }
    .progress-track { width: 80px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    .progress-fill { height: 100%; background: #FFD700; border-radius: 2px; transition: width 0.2s; }

    /* ── GRID BUTTONS (hair, eyes, nose, city) ── */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; flex: 1; min-height: 0; overflow-y: auto; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 4px; flex: 1; min-height: 0; overflow-y: auto; }
    .grid-btn {
      padding: 8px 4px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e;
      color: #aaa; font-size: 11px; font-weight: 600; cursor: pointer;
      touch-action: manipulation; text-align: center; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .grid-btn.selected { border-color: #FFD700; background: rgba(255,215,0,0.1); color: #FFD700; }

    .socio-preview { display: flex; flex-direction: column; gap: 3px; padding: 6px 8px; background: rgba(255,255,255,0.04); border-radius: 6px; margin-top: 4px; font-size: 10px; }
    .socio-preview .cash { color: #0f3; font-weight: bold; font-size: 11px; }
    .socio-preview .detail { color: #888; }

    .confirm-list { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
    .confirm-list .line { color: #ccc; font-size: 11px; line-height: 1.4; }
    .confirm-list .line.sep { color: #555; }

  _init(){

      this.layers[id] = document.getElementById('layer-'+id);
    });
  },
  _g(id){ return this.layers[id]; },
  _clear(id){ const g=this._g(id); if(g) g.innerHTML=''; },
  _path(parent,d,fill,stroke,sw){
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d); p.setAttribute('fill',fill||'none');
    if(stroke){p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',sw||'1');}
    parent.appendChild(p); return p;
  },
  _ellipse(parent,cx,cy,rx,ry,fill,stroke,sw){
    const e=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    e.setAttribute('cx',cx);e.setAttribute('cy',cy);e.setAttribute('rx',rx);e.setAttribute('ry',ry);
    e.setAttribute('fill',fill||'none');
    if(stroke){e.setAttribute('stroke',stroke);e.setAttribute('stroke-width',sw||'1');}
    parent.appendChild(e); return e;
  },
  _circle(parent,cx,cy,r,fill){
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('fill',fill||'none');
    parent.appendChild(c);
  },
  _line(parent,x1,y1,x2,y2,stroke,sw){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',stroke||'#000');l.setAttribute('stroke-width',sw||'1');
    l.setAttribute('stroke-linecap','round');
    parent.appendChild(l);
  },

  _updateSkinGradient(){
    const tones = skinTonesForEthnicity();
    const idx = clamp(Math.floor(S.character.skinToneIdx||0), 0, tones.length-1);
    const key = tones[idx];
    const stops = SKIN_TONES[key].stops;
    for(let i=0;i<4;i++){
      const el = document.getElementById('skin-stop-'+i);
      if(el) el.setAttribute('stop-color', stops[i]);
    }
  },

  _updateHairGradient(){
    const colors = hairColorsForEthnicity();
    const idx = clamp(S.character.hairColor, 0, colors.length-1);
    const stops = colors[idx].stops;
    for(let i=0;i<3;i++){
      const el = document.getElementById('hair-stop-'+i);
      if(el) el.setAttribute('stop-color', stops[i]);
    }
  },

  render(){
    const c = S.character;
    const isF = c.sex === 'female';
    const isI = c.sex === 'intersex';
    const hasBreasts = isF || isI;

    // ── Normalize sliders to 0-1 ──
    const t = {
      chest:   c.chest/100,
      waist:   c.waist/100,
      hips:    c.hips/100,
      height:  c.height/100,
      weight:  c.weight/100,
      muscle:  c.muscle/100,
      organ:   c.organSize/100,
      hWidth:  c.headWidth/100,
      hLength: c.headLength/100,
    };

    // ── Core proportions ──
    const cx = 100;
    const headR = lerp(40, 54, t.hWidth);     // head radius X
    const headRY = lerp(46, 58, t.hLength);    // head radius Y
    const headY = 72;                           // head center Y
    const neckW = lerp(8, 16, t.weight);
    const neckH = lerp(10, 18, t.muscle);
    const shoulderY = headY + headRY + neckH;
    const shW = lerp(isF?22:28, isF?34:44, t.weight) + lerp(0, 8, t.muscle) + lerp(0, 6, t.chest);
    const waistW = lerp(isF?10:14, isF?22:26, t.weight) - lerp(0, 6, t.muscle) + lerp(0, -4, t.waist);
    const hipW = lerp(isF?14:10, isF?28:18, t.hips) + lerp(0, 8, t.weight);
    const torsoH = lerp(140, 200, t.height);
    const waistY = shoulderY + torsoH * 0.42;
    const hipY = shoulderY + torsoH * 0.72;
    const legH = lerp(120, 170, t.height);
    const footY = hipY + legH;
    const legW = lerp(5, 10, t.weight) + lerp(0, 5, t.muscle);
    const legGap = 2 + legW * 0.3;
    const breastSize = hasBreasts ? lerp(2, 16, t.chest) * lerp(1, 0.6, t.muscle) : 0;

    // Update gradients
    this._updateSkinGradient();
    this._updateHairGradient();

    const skinFill = 'url(#skinGrad)';
    const hairFill = 'url(#hairGrad)';
    const outline = '#3a2a1a';
    const outlineW = 2;

    // Clear all layers
    ['back-hair','body','genitals','clothing','head','face','hair','accessories'].forEach(id=>this._clear(id));

    // ═══ BODY LAYER ═══
    const bodyG = this._g('body');

    // Torso
    const torso = `
      M ${cx-shW} ${shoulderY}
      C ${cx-shW-4} ${shoulderY+20}, ${cx-waistW-2} ${waistY-10}, ${cx-waistW} ${waistY}
      C ${cx-waistW-2} ${waistY+20}, ${cx-hipW-2} ${hipY-10}, ${cx-hipW} ${hipY}
      L ${cx+hipW} ${hipY}
      C ${cx+hipW+2} ${hipY-10}, ${cx+waistW+2} ${waistY+20}, ${cx+waistW} ${waistY}
      C ${cx+waistW+2} ${waistY-10}, ${cx+shW+4} ${shoulderY+20}, ${cx+shW} ${shoulderY}
      C ${cx+shW-4} ${shoulderY-4}, ${cx-shW+4} ${shoulderY-4}, ${cx-shW} ${shoulderY} Z`;
    this._path(bodyG, torso, skinFill, outline, outlineW);

    // Shoulders (caps)
    this._path(bodyG, `M ${cx-shW} ${shoulderY} C ${cx-shW-10} ${shoulderY-2}, ${cx-shW-18} ${shoulderY+4}, ${cx-shW-16} ${shoulderY+10} C ${cx-shW-12} ${shoulderY+14}, ${cx-shW-4} ${shoulderY+10}, ${cx-shW+4} ${shoulderY+4} Z`, skinFill, outline, outlineW);
    this._path(bodyG, `M ${cx+shW} ${shoulderY} C ${cx+shW+10} ${shoulderY-2}, ${cx+shW+18} ${shoulderY+4}, ${cx+shW+16} ${shoulderY+10} C ${cx+shW+12} ${shoulderY+14}, ${cx+shW+4} ${shoulderY+10}, ${cx+shW-4} ${shoulderY+4} Z`, skinFill, outline, outlineW);

    // Neck
    this._path(bodyG, `M ${cx-neckW} ${headY+headRY-4} L ${cx-neckW} ${shoulderY} C ${cx-neckW} ${shoulderY+4}, ${cx+neckW} ${shoulderY+4}, ${cx+neckW} ${shoulderY} L ${cx+neckW} ${headY+headRY-4} Z`, skinFill, outline, outlineW);

    // Arms
    const armLen = lerp(100, 140, t.height);
    const armW = lerp(6, 12, t.weight) + lerp(0, 4, t.muscle);
    // Left arm
    this._path(bodyG, `M ${cx-shW-8} ${shoulderY+8} C ${cx-shW-12} ${shoulderY+armLen*0.3}, ${cx-shW-14} ${shoulderY+armLen*0.6}, ${cx-shW-10} ${shoulderY+armLen} C ${cx-shW-6} ${shoulderY+armLen+8}, ${cx-shW+4} ${shoulderY+armLen+6}, ${cx-shW+2} ${shoulderY+armLen} C ${cx-shW+6} ${shoulderY+armLen*0.6}, ${cx-shW+4} ${shoulderY+armLen*0.3}, ${cx-shW} ${shoulderY+12} Z`, skinFill, outline, outlineW);
    // Right arm
    this._path(bodyG, `M ${cx+shW+8} ${shoulderY+8} C ${cx+shW+12} ${shoulderY+armLen*0.3}, ${cx+shW+14} ${shoulderY+armLen*0.6}, ${cx+shW+10} ${shoulderY+armLen} C ${cx+shW+6} ${shoulderY+armLen+8}, ${cx+shW-4} ${shoulderY+armLen+6}, ${cx+shW-2} ${shoulderY+armLen} C ${cx+shW-6} ${shoulderY+armLen*0.6}, ${cx+shW-4} ${shoulderY+armLen*0.3}, ${cx+shW} ${shoulderY+12} Z`, skinFill, outline, outlineW);

    // Legs
    const legSpread = hipW * 0.25;
    // Left leg
    this._path(bodyG, `M ${cx-legSpread-legW} ${hipY} C ${cx-legSpread-legW-2} ${hipY+legH*0.3}, ${cx-legSpread-legW-1} ${hipY+legH*0.7}, ${cx-legSpread-legW} ${footY-4} C ${cx-legSpread-legW-1} ${footY}, ${cx-legSpread} ${footY+4}, ${cx-legSpread+legW*0.6} ${footY+2} C ${cx-legSpread+legW} ${footY-2}, ${cx-legSpread+legW+2} ${hipY+legH*0.7}, ${cx-legSpread+legW+1} ${hipY+legH*0.3} Z`, skinFill, outline, outlineW);
    // Right leg
    this._path(bodyG, `M ${cx+legSpread+legW} ${hipY} C ${cx+legSpread+legW+2} ${hipY+legH*0.3}, ${cx+legSpread+legW+1} ${hipY+legH*0.7}, ${cx+legSpread+legW} ${footY-4} C ${cx+legSpread+legW+1} ${footY}, ${cx+legSpread} ${footY+4}, ${cx+legSpread-legW*0.6} ${footY+2} C ${cx+legSpread-legW} ${footY-2}, ${cx+legSpread-legW-2} ${hipY+legH*0.7}, ${cx+legSpread-legW-1} ${hipY+legH*0.3} Z`, skinFill, outline, outlineW);

    // Breast outlines (paper-doll style: circles on torso)
    if(breastSize > 0.5){
      const bX = lerp(5, 10, t.chest);
      const bY = shoulderY + lerp(18, 28, t.chest);
      this._ellipse(bodyG, cx-bX, bY, breastSize, breastSize*0.85, 'none', outline, 1.5);
      this._ellipse(bodyG, cx+bX, bY, breastSize, breastSize*0.85, 'none', outline, 1.5);
      // Nipple dots
      this._circle(bodyG, cx-bX, bY, lerp(1.5, 3, t.chest), outline);
      this._circle(bodyG, cx+bX, bY, lerp(1.5, 3, t.chest), outline);
    }

    // ═══ HEAD LAYER ═══
    const headG = this._g('head');
    // Head shape: ellipse with width/length control
    this._ellipse(headG, cx, headY, headR, headRY, skinFill, outline, outlineW);
    // Ears
    this._path(headG, `M ${cx-headR+2} ${headY-4} C ${cx-headR-6} ${headY-10}, ${cx-headR-8} ${headY+2}, ${cx-headR-4} ${headY+8} C ${cx-headR} ${headY+10}, ${cx-headR+4} ${headY+6}, ${cx-headR+2} ${headY} Z`, skinFill, outline, 1.5);
    this._path(headG, `M ${cx+headR-2} ${headY-4} C ${cx+headR+6} ${headY-10}, ${cx+headR+8} ${headY+2}, ${cx+headR+4} ${headY+8} C ${cx+headR} ${headY+10}, ${cx+headR-4} ${headY+6}, ${cx+headR-2} ${headY} Z`, skinFill, outline, 1.5);

    // ═══ FACE LAYER ═══
    const faceG = this._g('face');
    const eyeY = headY + lerp(-2, 4, t.hLength);
    const eyeSp = lerp(16, 24, t.hWidth);
    const eyeType = EYE_TYPES[c.eyeType] || EYE_TYPES[0];
    const noseType = NOSE_TYPES[c.noseType] || NOSE_TYPES[0];

    // ── Eyes based on type ──
    const eyeW = eyeType.key==='round'?14 : eyeType.key==='narrow'?10 : eyeType.key==='wide'?16 : 13;
    const eyeH = eyeType.key==='round'?12 : eyeType.key==='narrow'?6 : eyeType.key==='wide'?10 : 9;
    const irisR = eyeType.key==='round'?7 : eyeType.key==='narrow'?4 : 6;
    const lidWeight = eyeType.key==='hooded'?3.5 : 2.5;

    for(const side of [-1, 1]){
      const ex = cx + side * eyeSp;
      // Sclera
      this._ellipse(faceG, ex, eyeY, eyeW, eyeH, 'white', outline, 1);
      // Iris
      this._circle(faceG, ex, eyeY+1, irisR, '#4a3080');
      // Pupil
      this._circle(faceG, ex, eyeY+1, irisR*0.5, '#1a0830');
      // Upper lid
      this._path(faceG, `M ${ex-eyeW} ${eyeY-eyeH*0.3} C ${ex-eyeW*0.5} ${eyeY-eyeH-4}, ${ex+eyeW*0.5} ${eyeY-eyeH-4}, ${ex+eyeW} ${eyeY-eyeH*0.3}`, 'none', '#2a1a10', lidWeight);
      // Lower lid hint
      this._path(faceG, `M ${ex-eyeW+2} ${eyeY+eyeH*0.5} C ${ex} ${eyeY+eyeH+2}, ${ex+eyeW-2} ${eyeY+eyeH+2}`, 'none', outline, 0.8);
      // Highlights
      this._circle(faceG, ex+irisR*0.3, eyeY-irisR*0.3, irisR*0.4, 'white');
      this._circle(faceG, ex-irisR*0.2, eyeY+irisR*0.3, irisR*0.2, 'white');
    }

    // Eyebrows
    const browY = eyeY - eyeH - 8;
    this._path(faceG, `M ${cx-eyeSp-eyeW} ${browY} C ${cx-eyeSp-eyeW*0.3} ${browY-4}, ${cx-eyeSp+eyeW*0.3} ${browY-4}, ${cx-eyeSp+eyeW} ${browY+2}`, 'none', outline, 1.8);
    this._path(faceG, `M ${cx+eyeSp+eyeW} ${browY} C ${cx+eyeSp+eyeW*0.3} ${browY-4}, ${cx+eyeSp-eyeW*0.3} ${browY-4}, ${cx+eyeSp-eyeW} ${browY+2}`, 'none', outline, 1.8);

    // ── Nose based on type ──
    const noseY = headY + lerp(8, 14, t.hLength);
    if(noseType.key==='small'){
      this._path(faceG, `M ${cx-2} ${noseY} L ${cx} ${noseY+6} L ${cx+2} ${noseY}`, 'none', '#a08070', 1.2);
    } else if(noseType.key==='medium'){
      this._path(faceG, `M ${cx-4} ${noseY-2} L ${cx-2} ${noseY+8} C ${cx} ${noseY+10}, ${cx+2} ${noseY+8}, ${cx+4} ${noseY-2}`, 'none', '#a08070', 1.2);
    } else if(noseType.key==='pointed'){
      this._path(faceG, `M ${cx-3} ${noseY-4} L ${cx} ${noseY+10} L ${cx+3} ${noseY-4}`, 'none', '#907060', 1.3);
    } else if(noseType.key==='flat'){
      this._path(faceG, `M ${cx-6} ${noseY+2} C ${cx-4} ${noseY+8}, ${cx+4} ${noseY+8}, ${cx+6} ${noseY+2}`, 'none', '#a08070', 1.2);
      this._path(faceG, `M ${cx-4} ${noseY+4} C ${cx-2} ${noseY+8}, ${cx+2} ${noseY+8}, ${cx+4} ${noseY+4}`, 'none', '#b09080', 0.8);
    } else if(noseType.key==='button'){
      this._path(faceG, `M ${cx-3} ${noseY} C ${cx-4} ${noseY+6}, ${cx} ${noseY+8}, ${cx+4} ${noseY+6} C ${cx+3} ${noseY+4}, ${cx+2} ${noseY}, ${cx-2} ${noseY} Z`, 'none', '#a08070', 1.2);
    } else { // hooked
      this._path(faceG, `M ${cx-2} ${noseY-6} C ${cx+2} ${noseY-2}, ${cx+4} ${noseY+4}, ${cx+2} ${noseY+10} C ${cx} ${noseY+12}, ${cx-2} ${noseY+10}, ${cx-4} ${noseY+4}`, 'none', '#907060', 1.3);
    }

    // Mouth
    const mouthY = headY + lerp(22, 32, t.hLength);
    this._path(faceG, `M ${cx-14} ${mouthY} C ${cx-6} ${mouthY+6}, ${cx+6} ${mouthY+6}, ${cx+14} ${mouthY}`, 'url(#lipGrad)', '#a06060', 1);
    this._path(faceG, `M ${cx-12} ${mouthY+1} C ${cx-4} ${mouthY+4}, ${cx+4} ${mouthY+4}, ${cx+12} ${mouthY+1}`, 'none', '#c07070', 0.5);

    // ═══ HAIR LAYER ═══
    const hairG = this._g('hair');
    const hairIdx = clamp(c.hairstyle, 0, HAIRSTYLES.length-1);
    const hs = HAIRSTYLES[hairIdx];
    if(hs && hs.paths){
      hs.paths.forEach(d => this._path(hairG, d, hairFill, '#2a1508', 1.5));
    }

    // ═══ GENITALS LAYER ═══
    const genG = this._g('genitals');
    const genY = hipY + 4;
    const organT = t.organ;

    if(c.sex === 'male'){
      // Penis
      const pLen = lerp(8, 22, organT);
      const pW = lerp(3, 7, organT);
      this._path(genG, `M ${cx-pW} ${genY} C ${cx-pW-1} ${genY+pLen*0.5}, ${cx-pW} ${genY+pLen}, ${cx} ${genY+pLen+2} C ${cx+pW} ${genY+pLen}, ${cx+pW+1} ${genY+pLen*0.5}, ${cx+pW} ${genY} Z`, skinFill, outline, 1.5);
      // Balls
      const ballR = lerp(3, 7, organT);
      this._ellipse(genG, cx-ballR, genY+2, ballR, ballR*0.8, skinFill, outline, 1.2);
      this._ellipse(genG, cx+ballR, genY+2, ballR, ballR*0.8, skinFill, outline, 1.2);
    } else if(c.sex === 'female'){
      // Vulva
      const vW = lerp(4, 10, organT);
      const vH = lerp(3, 7, organT);
      // Mons
      this._ellipse(genG, cx, genY-2, vW+2, vH+2, skinFill, outline, 1.5);
      // Labia
      this._path(genG, `M ${cx-vW} ${genY} C ${cx-vW+1} ${genY+vH}, ${cx-1} ${genY+vH+2}, ${cx} ${genY+vH} C ${cx+1} ${genY+vH+2}, ${cx+vW-1} ${genY+vH}, ${cx+vW} ${genY}`, 'none', '#804040', 1.2);
      // Clitoris
      this._circle(genG, cx, genY-1, lerp(1, 2.5, organT), '#a06060');
    } else { // intersex
      const pLen = lerp(4, 12, organT);
      const pW = lerp(2, 5, organT);
      this._path(genG, `M ${cx-pW} ${genY} C ${cx-pW-1} ${genY+pLen*0.5}, ${cx-pW} ${genY+pLen}, ${cx} ${genY+pLen+1} C ${cx+pW} ${genY+pLen}, ${cx+pW+1} ${genY+pLen*0.5}, ${cx+pW} ${genY} Z`, skinFill, outline, 1.5);
      const vW = lerp(3, 7, organT);
      this._path(genG, `M ${cx-vW} ${genY+2} C ${cx-vW+1} ${genY+6}, ${cx} ${genY+8}, ${cx+vW-1} ${genY+6} C ${cx+vW} ${genY+4}, ${cx+vW} ${genY+2}, ${cx} ${genY+1}`, 'none', '#804040', 1);
    }
  }
};

function mkSlider(label, key, lo, hi, fmt){
  const id = 'slider-'+key;
  return `
    <div class="slider-row">
      <div><span class="slider-label">${label}</span><span class="slider-value" id="${id}-val"></span></div>
      <input type="range" id="${id}" min="0" max="100" value="50">
      <div class="range-hints"><span>${lo}</span><span>${hi}</span></div>
    </div>`;
}

function mkGridButtons(items, key, cls){
  return `<div class="${cls||'grid-3'}" id="grid-${key}">` +
    items.map((item,i) => `<button class="grid-btn" data-key="${key}" data-idx="${i}">${item.label}</button>`).join('') +
    '</div>';
}

function mkSliderWithGradient(label, key, lo, hi, cL, cR){
  const id = 'slider-'+key;
  return `
    <div class="slider-row">
      <div><span class="slider-label">${label}</span><span class="slider-value" id="${id}-val"></span></div>
      <input type="range" class="grad" id="${id}" min="0" max="100" value="50" style="--g-l:${cL};--g-r:${cR};">
      <div class="range-hints"><span>${lo}</span><span>${hi}</span></div>
    </div>`;
}

  <div class="step-subtitle">Gender is separate from birth sex</div>
  ${mkSliderWithGradient('Gender','gender','Masc','Fem','#4A90D9','#E94560')}
  ${mkSlider('Romantic','romantic','Aromantic','Romantic')}
  ${mkSlider('Attraction','homo','Hetero','Homo')}
  ${mkSlider('Libido','sexual','Low','High')}
`);

// ── STEP 5: Personality ──
stepBuilders.push(() => {
  const mbtiRows = MBTI.map(m => mkSliderWithGradient(
    `${m.left} ↔ ${m.right}`, 'mbti-'+m.key, m.left.split('[')[0], m.right.split('[')[0], m.cL, m.cR
  )).join('');
  return `<div class="step-title">Step 6: Personality</div>
    <div class="step-subtitle">How do you tend to be?</div>
    ${mbtiRows}`;
});

// ── STEP 6: Socio-Economics ──
stepBuilders.push(() => `
  <div class="step-title">Step 7: Background</div>
  <div class="step-subtitle">Finances, connections & neighborhood</div>
  ${mkSlider('Family Finances','finances','Poor','Wealthy')}
  ${mkSlider('Social Capital','socialCapital','Unknown','Well-connected')}
  ${mkSlider('Neighborhood','neighborhood','Rough','Upscale')}
  <div class="socio-preview" id="socio-preview"></div>
`);

// ── STEP 7: City ──
stepBuilders.push(() => `
  <div class="step-title">Step 8: Starting City</div>
  <div class="step-subtitle">Where will you begin?</div>
  <div class="grid-2" id="grid-city">
    ${CITIES.map(city => `<button class="grid-btn" data-key="city" data-val="${city}">${city}</button>`).join('')}
  </div>
`);

// ══════════════════════════════════════════════════════════════
// UI CONTROLLER
// ══════════════════════════════════════════════════════════════
function renderStep(){
  const zone = document.getElementById('sliders-zone');
  const stepDivs = zone.querySelectorAll('.step');
  stepDivs.forEach(d => d.remove());

  const stepEl = document.createElement('div');
  stepEl.className = 'step';
  stepEl.id = 'step-'+S.step;
  stepEl.innerHTML = stepBuilders[S.step]();
  zone.appendChild(stepEl);

  // Wire up all inputs for this step
  wireStep();
  updateUI();
}

function wireStep(){
  const stepEl = document.getElementById('step-'+S.step);
  if(!stepEl) return;

  // Range sliders
  stepEl.querySelectorAll('input[type="range"]').forEach(input=>{
    input.addEventListener('input', ()=>{
      const key = input.id.replace('slider-','');
      if(key.startsWith('mbti-')){
        const mbtiKey = key.replace('mbti-','');
        S.character.mbti[mbtiKey] = parseInt(input.value);
      } else if(key === 'skinTone'){
        S.character.skinToneIdx = parseInt(input.value);
      } else if(key === 'hairColor'){
        S.character.hairColor = parseInt(input.value);
      } else if(key === 'ethnicity'){
        const ethIdx = Math.round(parseInt(input.value) / (100/(ETHNICITIES.length-1)));
        S.character.ethnicity = ETHNICITIES[clamp(ethIdx,0,ETHNICITIES.length-1)];
      } else if(key === 'age'){
        S.character.age = 18 + Math.round(parseInt(input.value) * 51 / 100);
      } else {
        S.character[key] = parseInt(input.value);
      }
      updateUI();
    });
  });

  // Grid buttons
  stepEl.querySelectorAll('.grid-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const key = btn.dataset.key;
      const idx = parseInt(btn.dataset.idx);
      const val = btn.dataset.val;
      if(val !== undefined){
        S.character[key] = val;
      } else {
        S.character[key] = idx;
      }
      // Update selected state
      stepEl.querySelectorAll(`.grid-btn[data-key="${key}"]`).forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      updateUI();
    });
  });

  // Name input
  const nameInput = stepEl.querySelector('#name-input');
  if(nameInput){
    nameInput.addEventListener('input', ()=>{
      S.character.name = nameInput.value || 'Alex';
    });
  }
}

function updateUI(){
  const c = S.character;
  const stepEl = document.getElementById('step-'+S.step);
  if(!stepEl) return;

  // Update slider values
  stepEl.querySelectorAll('input[type="range"]').forEach(input=>{
    const key = input.id.replace('slider-','');
    const valEl = document.getElementById(input.id+'-val');
    if(!valEl) return;

    if(key === 'age'){
      input.value = Math.round((c.age - 18) * 100 / 51);
      valEl.textContent = ageLabel(c.age);
    } else if(key === 'ethnicity'){
      const ethIdx = ETHNICITIES.indexOf(c.ethnicity);
      input.value = Math.round(ethIdx * (100/(ETHNICITIES.length-1)));
      valEl.textContent = c.ethnicity;
    } else if(key === 'skinTone'){
      const tones = skinTonesForEthnicity();
      input.max = Math.max(0, tones.length-1);
      input.value = clamp(c.skinToneIdx||0, 0, tones.length-1);
      valEl.textContent = tones[clamp(c.skinToneIdx||0,0,tones.length-1)]||'';
    } else if(key === 'hairColor'){
      const colors = hairColorsForEthnicity();
      input.max = Math.max(0, colors.length-1);
      input.value = clamp(c.hairColor, 0, colors.length-1);
      valEl.textContent = colors[clamp(c.hairColor,0,colors.length-1)]?.label||'';
    } else if(key.startsWith('mbti-')){
      const mbtiKey = key.replace('mbti-','');
      input.value = c.mbti[mbtiKey];
      valEl.textContent = c.mbti[mbtiKey]+'%';
    } else {
      input.value = c[key] ?? 50;
      valEl.textContent = (c[key]??50)+'%';
    }
  });

  // Update grid button selection
  stepEl.querySelectorAll('.grid-btn').forEach(btn=>{
    const key = btn.dataset.key;
    const idx = parseInt(btn.dataset.idx);
    const val = btn.dataset.val;
    if(val !== undefined){
      btn.classList.toggle('selected', c[key] === val);
    } else {
      btn.classList.toggle('selected', c[key] === idx);
    }
  });

  // Socio preview
  const socioEl = document.getElementById('socio-preview');
  if(socioEl){
    const cash = Math.round(Math.pow(c.finances/100, 2.5) * 50000);
    socioEl.innerHTML = `
      <span class="cash">Starting Cash: $${cash.toLocaleString()}</span>
      <span class="detail">Family: ${c.finances<30?'Working class':c.finances<60?'Middle class':'Upper class'}</span>
      <span class="detail">Connections: ${c.socialCapital<30?'None':c.socialCapital<60?'Some':'Well-connected'}</span>
      <span class="detail">Neighborhood: ${c.neighborhood<30?'Rough':c.neighborhood<60?'Average':'Upscale'}</span>
    `;
  }

  // Re-render character
  SVG.render();
}

function updateNav(){
  document.getElementById('step-indicator').textContent = (S.step+1)+' / '+S.totalSteps;
  document.getElementById('progress-fill').style.width = ((S.step+1)/S.totalSteps*100)+'%';
  document.getElementById('btn-back').style.visibility = S.step===0?'hidden':'visible';
}

// ══════════════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════════════
document.getElementById('btn-back').addEventListener('click', ()=>{
  if(S.step>0){ S.step--; renderStep(); updateNav(); }
});
document.getElementById('btn-continue').addEventListener('click', ()=>{
  if(S.step<S.totalSteps-1){ S.step++; renderStep(); updateNav(); }
});

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
SVG._init();
renderStep();
updateNav();
</script>
</body>
</html>
