<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LifeSim — Character Creator</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: system-ui, -apple-system, sans-serif; color: #ddd; }
    .app {
      display: grid;
      grid-template-rows: 1fr auto 56px;
      grid-template-areas: "preview" "sliders" "nav";
      height: 100dvh; height: 100vh;
    }
    @media (min-width: 768px) {
      .app { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 56px; grid-template-areas: "preview sliders" "nav nav"; }
    }
    .preview-zone {
      grid-area: preview; display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: linear-gradient(180deg, #0d0d24 0%, #151530 50%, #0a0a1a 100%);
    }
    #pixi-canvas { display: block; max-width: 100%; max-height: 100%; }

    .sliders-zone {
      grid-area: sliders; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
      padding: 8px 16px 12px; background: #0f0f23; min-height: 0;
    }
    .step { display: flex; flex-direction: column; gap: 6px; }
    .step[hidden] { display: none !important; }
    .sliders-zone h2 {
      font-size: 13px; letter-spacing: 0.5px; color: #666; text-transform: uppercase; margin-bottom: 8px;
    }
    .sliders-zone h3 {
      font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* Native range sliders for mobile */
    .slider-row {
      display: flex; align-items: center; gap: 10px; padding: 2px 0;
    }
    .slider-row label {
      font-size: 12px; color: #999; width: 60px; flex-shrink: 0;
    }
    .slider-row input[type=range] {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 44px; background: transparent; cursor: pointer;
      touch-action: pan-y;
    }
    .slider-row input[type=range]::-webkit-slider-runnable-track {
      height: 4px; background: #333; border-radius: 2px;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 44px; height: 44px; border-radius: 50%;
      background: gold; border: 3px solid #fff;
      margin-top: -20px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .slider-row input[type=range]::-moz-range-track {
      height: 4px; background: #333; border-radius: 2px;
    }
    .slider-row input[type=range]::-moz-range-thumb {
      width: 44px; height: 44px; border-radius: 50%;
      background: gold; border: 3px solid #fff;
      cursor: pointer;
    }

    .slider-row .val {
      font-size: 13px; color: #ccc; width: 20px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums;
    }

    .nav-bar {
      grid-area: nav; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; background: #0f0f23; border-top: 1px solid #1a1a35;
    }
    .nav-bar button {
      -webkit-appearance: none; appearance: none; border: 1px solid #333; background: #1a1a35;
      color: #ccc; padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s; min-width: 80px;
    }
    .nav-bar button:active { background: #252550; border-color: gold; color: #fff; }
    .sex-toggle {
      display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid #333;
    }
    .sex-toggle button {
      -webkit-appearance: none; appearance: none; border: none; background: #1a1a35;
      color: #666; padding: 8px 16px; font-size: 12px; cursor: pointer; min-width: 0;
      transition: background 0.15s, color 0.15s;
    }
    .sex-toggle button.active { background: #252550; color: gold; }
    .sex-toggle button:first-child { border-right: 1px solid #333; }
    .step-indicator {
      font-size: 11px; color: #555; letter-spacing: 0.3px;
    }
    .step-title { font-size: 14px; color: #ccc; font-weight: 500; }
    .hair-grid {
      display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; padding: 4px 0;
    }
    .hair-grid button, .face-grid button {
      -webkit-appearance: none; appearance: none; border: 2px solid transparent;
      background: #1a1a35; border-radius: 6px; color: #888; font-size: 11px;
      padding: 8px 0; cursor: pointer; transition: all 0.15s;
    }
    .hair-grid button.active { border-color: gold; background: #252550; color: #fff; }
    .hair-grid button:active { border-color: gold; }

    .face-grid {
      display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0;
    }
    .face-grid button {
      width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .face-grid button.active { border-color: gold; background: #252550; }

    .color-grid {
      display: flex; gap: 10px; flex-wrap: wrap; padding: 4px 0;
    }
    .color-grid button {
      -webkit-appearance: none; appearance: none; width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s;
    }
    .color-grid button.active { border-color: gold; transform: scale(1.15); }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="preview-zone">
    <canvas id="pixi-canvas"></canvas>
  </div>
  <div class="sliders-zone" id="sliders-zone">
    <!-- Step 1: Sex -->
    <div class="step" id="step-0" style="justify-content:center;align-items:center;padding:20px 0">
      <h2 style="margin-bottom:16px">Select Sex</h2>
      <div class="sex-toggle">
        <button data-sex="male">♂ Male</button>
        <button data-sex="female">♀ Female</button>
      </div>
    </div>
    <!-- Step 2: Body -->
    <div class="step" id="step-1" hidden>
      <h2>Body Shape</h2>
      <div class="slider-row"><label>Shoulders</label><input type="range" min="0" max="100" value="50" data-key="shoulders"><span class="val">50</span></div>
      <div class="slider-row"><label>Bust</label><input type="range" min="0" max="100" value="50" data-key="bust"><span class="val">50</span></div>
      <div class="slider-row"><label>Chest</label><input type="range" min="0" max="100" value="50" data-key="chest"><span class="val">50</span></div>
      <div class="slider-row"><label>Waist</label><input type="range" min="0" max="100" value="50" data-key="waist"><span class="val">50</span></div>
      <div class="slider-row"><label>Hips</label><input type="range" min="0" max="100" value="50" data-key="hips"><span class="val">50</span></div>
      <div class="slider-row"><label>Height</label><input type="range" min="0" max="100" value="50" data-key="height"><span class="val">50</span></div>
      <div class="slider-row"><label>Weight</label><input type="range" min="0" max="100" value="50" data-key="weight"><span class="val">50</span></div>
      <div class="slider-row"><label>Muscle</label><input type="range" min="0" max="100" value="50" data-key="muscle"><span class="val">50</span></div>
    </div>
    <!-- Step 3: Head -->
    <div class="step" id="step-2" hidden>
      <h2>Head Shape</h2>
      <div class="slider-row"><label>Width</label><input type="range" min="0" max="100" value="50" data-key="headW"><span class="val">50</span></div>
      <div class="slider-row"><label>Length</label><input type="range" min="0" max="100" value="50" data-key="headLen"><span class="val">50</span></div>
    </div>
    <!-- Step 4: Skin -->
    <div class="step" id="step-3" hidden>
      <h2>Skin Tone</h2>
      <div class="color-grid" id="skin-grid"></div>
    </div>
    <!-- Step 5: Face -->
    <div class="step" id="step-4" hidden>
      <h2>Face Features</h2>
      <h3>Eyes</h3>
      <div class="face-grid" id="eyes-grid"></div>
      <h3>Brows</h3>
      <div class="face-grid" id="brows-grid"></div>
      <h3>Nose</h3>
      <div class="face-grid" id="nose-grid"></div>
      <h3>Mouth</h3>
      <div class="face-grid" id="mouth-grid"></div>
    </div>
    <!-- Step 6: Hair -->
    <div class="step" id="step-5" hidden>
      <h2>Hair Style</h2>
      <h3>Style</h3>
      <div class="hair-grid" id="hair-grid"></div>
      <h3>Color</h3>
      <div class="color-grid" id="haircolor-grid"></div>
    </div>
    <!-- Step 7: Eyes -->
    <div class="step" id="step-6" hidden>
      <h2>Eye Color</h2>
      <div class="color-grid" id="eyecolor-grid"></div>
    </div>
    <!-- Step 8: Outfit -->
    <div class="step" id="step-7" hidden>
      <h2>Outfit</h2>
      <p style="color:#666;font-size:13px">Coming soon</p>
    </div>
    <!-- Step 9: Summary -->
    <div class="step" id="step-8" hidden>
      <h2>Character Complete!</h2>
      <p style="color:#888;font-size:13px">You can go back to adjust any feature.</p>
    </div>
  </div>
  <div class="nav-bar">
    <button id="btn-back">← Back</button>
    <span class="step-indicator">1 / 9</span>
    <button id="btn-next">Continue →</button>
  </div>
</div>

/**
 * Parse SVG path commands and draw onto a PIXI.Graphics object.
 * Handles: M/m, C/c, S/s, L/l, H/h, V/v, Z/z
 * Returns the graphics object.
 */
function svgPathToGraphics(pathStr) {
  const g = new PIXI.Graphics();
  const tokens = pathStr.match(/[a-zA-Z][^a-zA-Z]*/g) || [];
  let cx = 0, cy = 0; // current point
  let sx = 0, sy = 0; // start of current subpath
  let prevCtrlX = 0, prevCtrlY = 0; // for smooth curves

  function parseCoords(s) {
    // SVG numbers can be compact like "c-16.667-0.29779" — no spaces between negative numbers
    const re = /[-+]?\d*\.?\d+(?:[eE][-+]?\d+)?/g;
    return (s.match(re) || []).map(Number);
  }

  function drawCmd(cmd, rel, args) {
    let i = 0;
    while (i < args.length) {
      switch (cmd) {
        case 'M': {
          const x = rel ? cx + args[i] : args[i];
          const y = rel ? cy + args[i+1] : args[i+1];
          g.moveTo(x, y);
          cx = x; cy = y; sx = x; sy = y;
          i += 2;
          // After M, implicit L if more coords
          if (i < args.length - 1) cmd = 'L';
          break;
        }
        case 'L': {
          const x = rel ? cx + args[i] : args[i];
          const y = rel ? cy + args[i+1] : args[i+1];
          g.lineTo(x, y);
          cx = x; cy = y;
          i += 2;
          break;
        }
        case 'H': {
          const x = rel ? cx + args[i] : args[i];
          g.lineTo(x, cy);
          cx = x;
          i += 1;
          break;
        }
        case 'V': {
          const y = rel ? cy + args[i] : args[i];
          g.lineTo(cx, y);
          cy = y;
          i += 1;
          break;
        }
        case 'C': {
          const c1x = rel ? cx + args[i] : args[i];
          const c1y = rel ? cy + args[i+1] : args[i+1];
          const c2x = rel ? cx + args[i+2] : args[i+2];
          const c2y = rel ? cy + args[i+3] : args[i+3];
          const ex = rel ? cx + args[i+4] : args[i+4];
          const ey = rel ? cy + args[i+5] : args[i+5];
          g.bezierCurveTo(c1x, c1y, c2x, c2y, ex, ey);
          prevCtrlX = c2x; prevCtrlY = c2y;
          cx = ex; cy = ey;
          i += 6;
          break;
        }
        case 'S': {
          // Reflect previous control point
          const rx = rel ? cx : 2*cx - prevCtrlX;
          const ry = rel ? cy : 2*cy - prevCtrlY;
          const c2x = rel ? cx + args[i] : args[i];
          const c2y = rel ? cy + args[i+1] : args[i+1];
          const ex = rel ? cx + args[i+2] : args[i+2];
          const ey = rel ? cy + args[i+3] : args[i+3];
          g.bezierCurveTo(rx, ry, c2x, c2y, ex, ey);
          prevCtrlX = c2x; prevCtrlY = c2y;
          cx = ex; cy = ey;
          i += 4;
          break;
        }
        case 'Z': {
          g.closePath();
          cx = sx; cy = sy;
          i += 0; // break;
          break;
        }
      }
    }
  }

  // The SVG body paths use relative coords (lowercase m, c, s)
  // We need to handle both upper and lower case
  let curX = 0, curY = 0;
  for (const token of tokens) {
    const cmdChar = token[0];
    const isRelative = cmdChar === cmdChar.toLowerCase();
    const cmd = cmdChar.toUpperCase();
    const nums = parseCoords(token.slice(1));
    if (nums.length === 0) {
      // z with no numbers
      if (cmd === 'Z') {
        g.closePath();
        curX = sx; curY = sy;
      }
      continue;
    }

    let i = 0;
    while (i < nums.length) {
      switch (cmd) {
        case 'M': {
          const x = isRelative ? curX + nums[i] : nums[i];
          const y = isRelative ? curY + nums[i+1] : nums[i+1];
          g.moveTo(x, y);
          sx = x; sy = y; curX = x; curY = y;
          i += 2;
          break;
        }
        case 'L': {
          const x = isRelative ? curX + nums[i] : nums[i];
          const y = isRelative ? curY + nums[i+1] : nums[i+1];
          g.lineTo(x, y);
          curX = x; curY = y;
          i += 2;
          break;
        }
        case 'H': {
          const x = isRelative ? curX + nums[i] : nums[i];
          g.lineTo(x, curY);
          curX = x;
          i += 1;
          break;
        }
        case 'V': {
          const y = isRelative ? curY + nums[i] : nums[i];
          g.lineTo(curX, y);
          curY = y;
          i += 1;
          break;
        }
        case 'C': {
          const c1x = isRelative ? curX + nums[i] : nums[i];
          const c1y = isRelative ? curY + nums[i+1] : nums[i+1];
          const c2x = isRelative ? curX + nums[i+2] : nums[i+2];
          const c2y = isRelative ? curY + nums[i+3] : nums[i+3];
          const ex = isRelative ? curX + nums[i+4] : nums[i+4];
          const ey = isRelative ? curY + nums[i+5] : nums[i+5];
          g.bezierCurveTo(c1x, c1y, c2x, c2y, ex, ey);
          prevCtrlX = c2x; prevCtrlY = c2y;
          curX = ex; curY = ey;
          i += 6;
          break;
        }
        case 'S': {
          const rx = isRelative ? curX : 2*curX - prevCtrlX;
          const ry = isRelative ? curY : 2*curY - prevCtrlY;
          const c2x = isRelative ? curX + nums[i] : nums[i];
          const c2y = isRelative ? curY + nums[i+1] : nums[i+1];
          const ex = isRelative ? curX + nums[i+2] : nums[i+2];
          const ey = isRelative ? curY + nums[i+3] : nums[i+3];
          g.bezierCurveTo(rx, ry, c2x, c2y, ex, ey);
          prevCtrlX = c2x; prevCtrlY = c2y;
          curX = ex; curY = ey;
          i += 4;
          break;
        }
        case 'Z': {
          g.closePath();
          curX = sx; curY = sy;
          break;
        }
        default: i = nums.length; break;
      }
    }
  }

  return g;
}

  // 1. Parse and build the base body shape
  // 2. Scale proportionally and apply the centering offset

  const rawW = isF ? 440 : 480;

  const swScale = lerp(0.85, 1.15, C.shoulders);
  const bustScale = lerp(0.85, 1.3, C.bust);
  const chestScale = lerp(0.8, 1.2, C.chest);
  const waistScale = lerp(0.7, 1.3, C.waist);
  const hipScale = lerp(0.8, 1.3, C.hips);

  const bodyScaleX = (swScale * 0.5 + (bustScale * 0.15 + chestScale * 0.15 + waistScale * 0.1 + hipScale * 0.1));

          break;
        }
        case 'V': {
          const y = isRelative ? curY + nums[i] : nums[i];
          body.lineTo(sx(curX), sy(y));
          curY = y;
          i += 1;
          break;
        }
        case 'L': {
          const x = isRelative ? curX + nums[i] : nums[i];
          const y = isRelative ? curY + nums[i+1] : nums[i+1];
          body.lineTo(sx(x), sy(y));
          curX = x; curY = y;
          i += 2;
          break;
        }
        case 'Z': {
          body.closePath();
          break;
        }
        default: i = nums.length;
      }
    }
  }
  body.endFill();

  layers.body.addChild(body);
}

// ─── HAIR ────────────────────────────────────────────────────
function drawHair(cx, hY, hW, hL) {
  const hc = HAIR_COLORS[C.hairColor];
  const style = C.hairStyle;
  const isF = C.sex === 'female';
  const bh = new PIXI.Graphics(); // back hair
  const fh = new PIXI.Graphics(); // front hair
  bh.beginFill(hc);

  switch(style) {
    case 0: break; // Bald
    case 1: // Short
      bh.drawEllipse(cx, hY-8, hW*1.2, hL*0.55);
      bh.drawRoundedRect(cx-hW, hY-6, hW*2, hL*0.5, 8);
      // front bangs
      fh.beginFill(hc);
      for(let i=-1;i<=1;i++) {
        fh.drawEllipse(cx+i*hW*0.3, hY+hL*0.15, hW*0.35, hL*0.2);
      }
      break;
    case 2: // Medium
      bh.drawEllipse(cx, hY-10, hW*1.3, hL*0.6);
      bh.drawRoundedRect(cx-hW*0.9, hY-8, hW*1.8, hL*0.6, 8);
      fh.beginFill(hc);
      fh.drawEllipse(cx, hY+hL*0.1, hW*0.8, hL*0.25);
      // sides
      fh.drawEllipse(cx-hW*0.5, hY+hL*0.25, hW*0.4, hL*0.3);
      fh.drawEllipse(cx+hW*0.5, hY+hL*0.25, hW*0.4, hL*0.3);
      break;
    case 3: // Long
      bh.drawEllipse(cx, hY-12, hW*1.4, hL*0.65);
      bh.drawRect(cx-hW*0.8, hY-6, hW*1.6, hL*1.0);
      // flowing down
      bh.drawEllipse(cx, hY+hL*0.5, hW*0.6, hL*0.6);
      fh.beginFill(hc);
      fh.drawEllipse(cx, hY+hL*0.08, hW*0.7, hL*0.2);
      fh.drawRoundedRect(cx-hW*0.8, hY+hL*0.2, hW*1.6, hL*0.2, 6);
      fh.drawEllipse(cx, hY+hL*0.3, hW*0.9, hL*0.15);
      break;
    case 4: // Ponytail
      bh.drawEllipse(cx, hY-10, hW*1.3, hL*0.58);
      bh.drawRect(cx-hW*0.7, hY-6, hW*1.4, hL*0.5);
      // ponytail behind
      bh.drawEllipse(cx+3, hY+hL*0.3, hW*0.3, hL*0.6);
      fh.beginFill(hc);
      fh.drawEllipse(cx, hY+hL*0.05, hW*0.6, hL*0.15);
      fh.drawRoundedRect(cx-hW*0.6, hY+hL*0.15, hW*1.2, hL*0.15, 6);
      break;
    case 5: // Bun
      bh.drawEllipse(cx, hY-12, hW*1.3, hL*0.55);
      bh.drawRoundedRect(cx-hW*0.7, hY-6, hW*1.4, hL*0.5, 8);
      // bun on top
      bh.drawEllipse(cx, hY-20, hW*0.6, hW*0.6);
      fh.beginFill(hc);
      fh.drawEllipse(cx, hY+hL*0.05, hW*0.55, hL*0.12);
      break;
    case 6: // Twin Tails
      bh.drawEllipse(cx, hY-10, hW*1.3, hL*0.55);
      bh.drawRoundedRect(cx-hW, hY-6, hW*2, hL*0.45, 8);
      // tails
      bh.drawEllipse(cx-hW*0.9, hY+hL*0.4, hW*0.3, hL*0.6);
      bh.drawEllipse(cx+hW*0.9, hY+hL*0.4, hW*0.3, hL*0.6);
      fh.beginFill(hc);
      fh.drawEllipse(cx, hY+hL*0.08, hW*0.65, hL*0.18);
      break;
    case 7: // Side Part
      bh.drawEllipse(cx, hY-10, hW*1.3, hL*0.58);
      bh.drawRoundedRect(cx-hW, hY-6, hW*2, hL*0.5, 8);
      fh.beginFill(hc);
      fh.drawEllipse(cx-hW*0.2, hY+hL*0.08, hW*0.5, hL*0.2);
      fh.drawEllipse(cx+hW*0.2, hY+hL*0.15, hW*0.3, hL*0.2);
      break;
    case 8: // Spiky
      bh.drawEllipse(cx, hY-10, hW*1.3, hL*0.55);
      bh.beginFill(hc);
      for(let i=-4;i<=4;i++) {
        const s = hW*(0.08+Math.abs(i)*0.02);
        bh.drawEllipse(cx+i*hW*0.22, hY-14-Math.abs(i)*2, s, s*0.5+3);
      }
      fh.beginFill(hc);
      fh.drawEllipse(cx, hY+hL*0.1, hW*0.7, hL*0.2);
      break;
    case 9: // Curly
      bh.drawEllipse(cx, hY-12, hW*1.4, hL*0.6);
      bh.drawRoundedRect(cx-hW*0.9, hY-6, hW*1.8, hL*0.55, 8);
      fh.beginFill(hc);
      fh.drawEllipse(cx, hY+hL*0.05, hW*0.75, hL*0.2);
      // curls
      for(let i=-2;i<=2;i++) {
        fh.drawEllipse(cx+i*hW*0.25, hY+hL*0.25, hW*0.3, hL*0.15);
      }
      break;
    case 10: // Bob
      bh.drawEllipse(cx, hY-10, hW*1.25, hL*0.55);
      bh.drawRect(cx-hW*0.85, hY-6, hW*1.7, hL*0.7);
      bh.drawEllipse(cx, hY+hL*0.5, hW*0.55, hL*0.3);
      fh.beginFill(hc);
      fh.drawEllipse(cx, hY+hL*0.08, hW*0.65, hL*0.18);
      break;
  }
  bh.endFill();
  fh.endFill();
  layers.backHair.addChild(bh);
  layers.frontHair.addChild(fh);
}

// ─── FACE ────────────────────────────────────────────────────
function drawFaceFeatures(cx, hY, hW, hL) {
  const eY = hY+hL*0.32, eSp = hW*0.38, eW = hW*0.28, eH = hL*0.22;
  const ec = EYE_COLORS[C.eyeColor];

  // Blush
  const bl = new PIXI.Graphics();
  bl.beginFill(0xff6b4a, 0.12);
  bl.drawEllipse(cx-hW*0.55, eY+eH*1.2, 10, 6);
  bl.drawEllipse(cx+hW*0.55, eY+eH*1.2, 10, 6);
  bl.endFill();
  layers.face.addChild(bl);

  drawEye(cx-eSp, eY, eW, eH, ec);
  drawEye(cx+eSp, eY, eW, eH, ec);
  drawBrow(cx-eSp, eY-eH*0.8, eW*1.2);
  drawBrow(cx+eSp, eY-eH*0.8, eW*1.2);
  drawNose(cx, hY+hL*0.55, hL*0.06);
  drawMouth(cx, hY+hL*0.75, hW*0.15);
}

function drawEye(x,y,w,h,c) {
  const t = C.eyeType;
  const g = new PIXI.Graphics();
  const fg = new PIXI.Graphics();

  // White of eye
  g.beginFill(0xeeeeee);
  switch(t) {
    case 0: // Standard
      g.moveTo(x-w*1.1,y); g.quadraticCurveTo(x,y-h*0.8,x+w*1.1,y);
      g.quadraticCurveTo(x,y+h*0.4,x-w*1.1,y); break;
    case 1: // Round
      g.drawEllipse(x, y, w*1.0, h*0.9); break;
    case 2: // Narrow
      g.moveTo(x-w*1.3,y); g.quadraticCurveTo(x,y-h*0.5,x+w*1.3,y);
      g.quadraticCurveTo(x,y+h*0.7,x-w*1.3,y); break;
    case 3: // Angry
      g.moveTo(x-w*1.2,y); g.quadraticCurveTo(x,y-h*1.0,x+w*1.2,y);
      g.quadraticCurveTo(x+w*0.3,y+h*0.5,x,y+h*0.3);
      g.quadraticCurveTo(x-w*0.3,y+h*0.5,x-w*1.2,y); break;
    case 4: // Sparkle
      g.moveTo(x-w*1.0,y); g.quadraticCurveTo(x,y-h*1.2,x+w*1.0,y);
      g.quadraticCurveTo(x,y+h*0.3,x-w*1.0,y); break;
    case 5: // Doe
      g.moveTo(x-w*1.2,y); g.quadraticCurveTo(x,y-h*1.4,x+w*1.2,y);
      g.quadraticCurveTo(x+w*0.4,y+h*0.2,x+w*0.2,y+h*0.5);
      g.quadraticCurveTo(x,y+h*0.7,x-w*0.2,y+h*0.5);
      g.quadraticCurveTo(x-w*0.4,y+h*0.2,x-w*1.2,y); break;
  }
  g.endFill();
  layers.face.addChild(g);

  // Iris
  fg.beginFill(c);
  fg.drawEllipse(x, y+h*0.1, w*0.55, h*0.5);
  fg.endFill();
  // Pupil
  fg.beginFill(0x111111);
  fg.drawEllipse(x, y+h*0.15, w*0.3, h*0.35);
  fg.endFill();
  // Highlight
  fg.beginFill(0xffffff, 0.9);
  fg.drawEllipse(x-w*0.1, y-h*0.05, w*0.2, h*0.2);
  fg.endFill();
  fg.beginFill(0xffffff, 0.5);
  fg.drawEllipse(x+w*0.15, y+h*0.2, w*0.1, h*0.12);
  fg.endFill();
  // Upper lid line
  const lg = new PIXI.Graphics();
  lg.lineStyle(2, 0x111111, 0.6);
  switch(t) {
    case 0: lg.moveTo(x-w*1.2,y); lg.quadraticCurveTo(x,y-h*0.8,x+w*1.2,y); break;
    case 1: lg.moveTo(x-w*1.1,y-h*0.6); lg.quadraticCurveTo(x,y-h*1.0,x+w*1.1,y-h*0.6); break;
    case 2: lg.moveTo(x-w*1.4,y); lg.quadraticCurveTo(x,y-h*0.5,x+w*1.4,y); break;
    case 3: lg.moveTo(x-w*1.3,y); lg.quadraticCurveTo(x,y-h*1.0,x+w*1.3,y); break;
    case 4: lg.moveTo(x-w*1.1,y+h*0.1); lg.quadraticCurveTo(x,y-h*1.2,x+w*1.1,y+h*0.1); break;
    case 5: lg.moveTo(x-w*1.3,y); lg.quadraticCurveTo(x,y-h*1.4,x+w*1.3,y); break;
  }
  lg.endFill();
  layers.face.addChild(lg);

  // Lower lash line
  const l2 = new PIXI.Graphics();
  l2.lineStyle(1, 0x111111, 0.25);
  switch(t) {
    case 0: l2.moveTo(x-w*0.8,y+h*0.3); l2.quadraticCurveTo(x,y+h*0.5,x+w*0.8,y+h*0.3); break;
    case 1: l2.moveTo(x-w*0.8,y+h*0.5); l2.quadraticCurveTo(x,y+h*0.8,x+w*0.8,y+h*0.5); break;
    case 3: l2.moveTo(x-w*0.8,y+h*0.5); l2.quadraticCurveTo(x,y+h*0.4,x+w*0.8,y+h*0.5); break;
  }
  l2.endFill();
  layers.face.addChild(l2);

  // Eyelashes (top)
  if(t === 4 || t === 5) {
    const las = new PIXI.Graphics();
    las.lineStyle(1.5, 0x111111, 0.4);
    for(let i=-1;i<=1;i++) {
      las.moveTo(x+i*w*0.6, y-h*0.6);
      las.lineTo(x+i*w*0.8, y-h*1.0);
    }
    las.endFill();
    layers.face.addChild(las);
  }
}

function drawBrow(x,y,w) {
  const t = C.browsType;
  const g = new PIXI.Graphics();
  g.lineStyle(2.5, 0x111111, 0.5);
  switch(t) {
    case 0: g.moveTo(x-w*0.8,y); g.quadraticCurveTo(x,y-w*0.3,x+w*0.8,y); break;
    case 1: g.moveTo(x-w*0.9,y-w*0.1); g.quadraticCurveTo(x,y-w*0.4,x+w*0.9,y-w*0.1); break;
    case 2: g.moveTo(x-w*0.8,y); g.quadraticCurveTo(x,y-w*0.15,x+w*0.8,y); break;
    case 3: g.moveTo(x-w*0.8,y); g.quadraticCurveTo(x,y-w*0.5,x+w*0.8,y); break;
    case 4: g.moveTo(x-w*0.8,y-w*0.2); g.quadraticCurveTo(x,y-w*0.1,x+w*0.8,y); break;
    case 5: g.moveTo(x-w*0.8,y); g.quadraticCurveTo(x,y-w*0.5,x+w*0.8,y-w*0.15); break;
  }
  g.endFill();
  layers.face.addChild(g);
}

function drawNose(x,y,s) {
  const t = C.noseType;
  const g = new PIXI.Graphics();
  g.beginFill(0x222222, 0.08);
  switch(t) {
    case 0: g.drawEllipse(x, y, s*1.0, s*0.8); break;
    case 1: g.drawCircle(x, y, s*0.7); break;
    case 2: g.drawEllipse(x, y, s*1.3, s*0.6); break;
    case 3: g.drawCircle(x, y, s*0.9); break;
    case 4: g.moveTo(x-s*0.3,y-s*0.5); g.quadraticCurveTo(x,y+s*0.3,x+s*0.3,y-s*0.5); break;
    case 5: g.drawEllipse(x, y, s*0.4, s); break;
  }
  g.endFill();
  layers.face.addChild(g);
}

function drawMouth(x,y,w) {
  const t = C.mouthType;
  const g = new PIXI.Graphics();
  g.lineStyle(2, 0x222222, 0.5);
  switch(t) {
    case 0: g.moveTo(x-w,y); g.quadraticCurveTo(x,y+w*0.8,x+w,y); break;
    case 1: g.moveTo(x-w,y+w*0.3); g.quadraticCurveTo(x,y-w*0.2,x+w,y+w*0.3); break;
    case 2: g.drawEllipse(x, y+h*0.1||0, w*0.7, w*0.5); break;
    case 3: g.moveTo(x-w,y); g.quadraticCurveTo(x,y+w*1.2,x+w,y); break;
    case 4: g.moveTo(x-w,y); g.lineTo(x+w,y); break;
    case 5: g.moveTo(x-w,y-w*0.2); g.quadraticCurveTo(x,y+w*0.5,x+w,y-w*0.2); break;
  }
  g.endFill();
  // Lip fill
  if(t === 2 || t === 3) {
    g.beginFill(0xcc4444, 0.3);
    g.endFill();
  }
  layers.face.addChild(g);
}

// ─── RENDER ──────────────────────────────────────────────────
function render() {
  clearLayers();
  const isF = C.sex === 'female';
  const hW = lerp(34,50,C.headW), hL = lerp(40,54,C.headLen);
  const cx=200, hY=50;

  // Back hair
  drawHair(cx, hY, hW, hL);

  // Body (SVG-based)
  drawSvgBody();

  // Head oval
  const hg = new PIXI.Graphics();
  hg.beginFill(SK[C.skinTone]||SK[1]);
  hg.drawEllipse(cx, hY, hW, hL);
  hg.endFill();
  layers.head.addChild(hg);

  // Chin
  const cg = new PIXI.Graphics(); cg.beginFill(SK[C.skinTone]||SK[1]);
  cg.moveTo(cx-hW*0.3, hY+hL*0.65);
  cg.quadraticCurveTo(cx-hW*0.15, hY+hL+2, cx, hY+hL);
  cg.quadraticCurveTo(cx+hW*0.15, hY+hL+2, cx+hW*0.3, hY+hL*0.65);
  cg.endFill();
  layers.head.addChild(cg);

  // Ears
  layers.head.addChild(fillEllipse(new PIXI.Graphics(), cx-hW-4, hY+hL*0.1, 6, 10, SK[C.skinTone]||SK[1]));
  layers.head.addChild(fillEllipse(new PIXI.Graphics(), cx+hW+4, hY+hL*0.1, 6, 10, SK[C.skinTone]||SK[1]));

  // Face features
  drawFaceFeatures(cx, hY, hW, hL);

  // Front hair
  const fh = new PIXI.Graphics();
  const fhc = HAIR_COLORS[C.hairColor];
  if(C.hairStyle > 0) {
    fh.beginFill(fhc);
    fh.drawEllipse(cx, hY+hL*0.08, hW*0.65, hL*0.18);
    fh.endFill();
  }
  layers.frontHair.addChild(fh);

  // Neck
  const ng = new PIXI.Graphics();
  ng.beginFill(SK[C.skinTone]||SK[1]);
  ng.drawRect(cx-hW*0.15, hY+hL+1, hW*0.3, 16);
  ng.endFill();
  layers.head.addChild(ng);
}

// ─── UI SETUP ────────────────────────────────────────────────
function buildColorGrid(id, colors, names, key) {
  const el = document.getElementById(id);
  el.innerHTML = colors.map((c,i) =>
    `<button data-value="${i}" style="background:#${c.toString(16).padStart(6,'0')}" title="${names[i]}"></button>`
  ).join('');
  el.addEventListener('click', e => {
    const b = e.target.closest('button');
    if(!b) return;
    C[key] = +b.dataset.value;
    el.querySelectorAll('button').forEach(b2 => b2.classList.toggle('active', b2===b));
    render();
  });
}

function buildFaceGrid(id, type, count) {
  const el = document.getElementById(id);
  const emojiType = type.toLowerCase();
  const emojis = FACE_EMOJIS[emojiType];
  el.innerHTML = Array.from({length:count}, (_,i) =>
    `<button data-value="${i}">${emojis?.[i]||i}</button>`
  ).join('');
  el.addEventListener('click', e => {
    const b = e.target.closest('button');
    if(!b) return;
    C[type+'Type'] = +b.dataset.value;
    el.querySelectorAll('button').forEach(b2 => b2.classList.toggle('active', b2===b));
    render();
  });
}

buildColorGrid('skin-grid', SK, SKIN_NAMES, 'skinTone');
buildColorGrid('haircolor-grid', HAIR_COLORS, HAIR_NAMES, 'hairColor');
buildColorGrid('eyecolor-grid', EYE_COLORS, EYE_NAMES, 'eyeColor');
buildFaceGrid('eyes-grid', 'eye', 6);
buildFaceGrid('brows-grid', 'brows', 6);
buildFaceGrid('nose-grid', 'nose', 6);
buildFaceGrid('mouth-grid', 'mouth', 6);

// Hair grid
const hairGrid = document.getElementById('hair-grid');
hairGrid.innerHTML = HAIR_STYLES.map((h,i) =>
  `<button data-value="${i}">${h.name}</button>`
).join('');
hairGrid.addEventListener('click', e => {
  const b = e.target.closest('button');
  if(!b) return;
  C.hairStyle = +b.dataset.value;
  hairGrid.querySelectorAll('button').forEach(b2 => b2.classList.toggle('active', b2===b));
  render();
});

// Slider binding
document.querySelectorAll('.slider-row input[type=range]').forEach(el => {
  el.addEventListener('input', () => {
    const key = el.dataset.key;
    C[key] = +el.value;
    el.parentElement.querySelector('.val').textContent = el.value;
    render();
  });
});

// Sex toggle
document.querySelector('.sex-toggle').addEventListener('click', e => {
  const b = e.target.closest('button');
  if(!b) return;
  C.sex = b.dataset.sex;
  document.querySelectorAll('.sex-toggle button').forEach(b2 => b2.classList.toggle('active', b2===b));
  render();
});

// Navigation
const steps = document.querySelectorAll('.step');
const header = document.querySelector('.step-indicator');
const btnBack = document.getElementById('btn-back');
const btnNext = document.getElementById('btn-next');

function showStep(n) {
  step = Math.max(0, Math.min(STEPS-1, n));
  steps.forEach((s,i) => s.hidden = i !== step);
  header.textContent = `${step+1} / ${STEPS}`;
  btnBack.style.visibility = step === 0 ? 'hidden' : 'visible';
  btnNext.textContent = step === STEPS-1 ? '✓ Done' : 'Continue →';
}

btnBack.addEventListener('click', () => showStep(step-1));
btnNext.addEventListener('click', () => showStep(step+1));

// Init
showStep(0);
render();
</script>
